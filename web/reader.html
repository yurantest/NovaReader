<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readest Reader</title>
    <style>
        @font-face {
            font-family: 'Material Icons';
            font-style: normal;
            font-weight: 400;
            src: url('../fonts/MaterialIcons-Regular.ttf') format('truetype');
        }

        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: var(--bg-color, #f4ecd8);
            color: var(--text-color, #5b4636);
            height: 100vh;
        }

        #app {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #viewer-container {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            background: transparent;
        }


        foliate-view {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
            border: none !important;
            outline: none !important;
        }

        /* Убираем все рамки у iframe внутри foliate-view */
        foliate-view iframe {
            border: none !important;
            outline: none !important;
        }

        /* Верхняя панель */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(32, 33, 36, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            z-index: 1000;
            transition: transform 0.3s;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .top-bar.hidden { transform: translateY(-100%); }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(32, 33, 36, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            z-index: 1000;
            transition: transform 0.3s;
            color: white;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .bottom-nav.hidden { transform: translateY(100%); }

        .icon-button {
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #e8eaed;
            transition: background 0.2s;
        }

        .icon-button:hover { background: rgba(255,255,255,0.1); }
        .icon-button:active { transform: scale(0.95); }
        .icon-button.primary { background: #1a73e8; }
        .icon-button.small { width: 32px; height: 32px; }
        .icon-button .material-icons { font-size: 22px; }

        .book-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 0 12px;
            min-width: 0;
        }

        .book-title {
            font-size: 14px;
            font-weight: 500;
            color: #e8eaed;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .book-author {
            font-size: 11px;
            color: #9aa0a6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .page-info {
            font-size: 13px;
            color: #9aa0a6;
            min-width: 70px;
            text-align: center;
        }
        
        #progressInfo {
            color: #4caf50 !important;
            font-weight: 500;
            min-width: 50px;
        }

        .tts-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4caf50;
            display: none;
        }
        .tts-indicator.active { display: block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; transform: scale(1.2); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* TTS кнопки поверх листа — в нижней части viewer-container */
        .tts-controls {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 500;
            pointer-events: auto;
        }
        .tts-controls.visible { display: flex; }

        /* Кнопка TTS на листе — прозрачный фон, только иконка */
        /* --tts-btn-color обновляется из JS при смене темы */
        :root { --tts-btn-color: rgba(80, 80, 80, 0.75); --tts-btn-hover: rgba(0,0,0,0.95); }

        .tts-page-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--tts-btn-color);
            padding: 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.15s;
            line-height: 1;
            filter: var(--tts-btn-shadow, drop-shadow(0 1px 2px rgba(0,0,0,0.3)));
        }
        .tts-page-btn:hover {
            color: var(--tts-btn-hover);
            transform: scale(1.2);
        }
        .tts-page-btn .material-icons { font-size: 24px; }
        /* Кнопка play/pause крупнее */
        #ttsPlayPauseBtn .material-icons { font-size: 30px; }

        .selection-toolbar {
            position: fixed;
            background: rgba(32, 33, 36, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            gap: 2px;
            z-index: 2000;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s, top 0.2s;
        }

        .selection-toolbar.visible {
            opacity: 1;
            pointer-events: all;
        }

        .toolbar-btn {
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #e8eaed;
            transition: background 0.2s;
        }

        .toolbar-btn:hover { background: rgba(255,255,255,0.1); }
        .toolbar-btn .material-icons { font-size: 20px; }

        .mini-palette {
            position: fixed;
            background: rgba(32, 33, 36, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 6px;
            display: flex;
            gap: 4px;
            z-index: 2100;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transform: translate(-50%, 0);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s, top 0.2s;
        }

        .mini-palette.visible {
            opacity: 1;
            pointer-events: all;
        }

        .color-option {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-red { background-color: #ff4444; }
        .color-violet { background-color: #b344ff; }
        .color-blue { background-color: #4488ff; }
        .color-green { background-color: #44ff44; }
        .color-yellow { background-color: #ffdd44; }

        .tts-settings-panel {
            position: fixed;
            bottom: 70px;
            right: 20px;
            width: 300px;
            background: rgba(32, 33, 36, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            color: white;
            z-index: 2000;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tts-settings-panel.visible { display: block; }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .settings-header h3 { font-size: 14px; font-weight: 500; color: #e8eaed; }

        .engine-section { margin-bottom: 16px; }
        .engine-section label { display: block; font-size: 11px; color: #9aa0a6; margin-bottom: 6px; text-transform: uppercase; }
        .engine-select { display: none; }
        .custom-select-wrapper { position: relative; width: 100%; }
        .custom-select-trigger {
            width: 100%; padding: 8px 10px; background: #1e1e2e;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
            color: #e8eaed; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            box-sizing: border-box; user-select: none;
        }
        .custom-select-trigger:hover { border-color: rgba(255,255,255,0.4); }
        .custom-select-trigger.open { border-color: #4a90e2; border-radius: 6px 6px 0 0; }
        .custom-select-dropdown {
            display: none; position: absolute; top: 100%; left: 0; right: 0;
            background: #1e1e2e; border: 1px solid #4a90e2;
            border-top: none; border-radius: 0 0 6px 6px;
            z-index: 1000; max-height: 200px; overflow-y: auto;
        }
        .custom-select-dropdown.open { display: block; }
        .custom-select-option {
            padding: 8px 10px; color: #e8eaed; font-size: 13px;
            cursor: pointer; transition: background 0.15s;
        }
        .custom-select-option:hover { background: rgba(74,144,226,0.3); color: #fff; }
        .custom-select-option.selected { background: rgba(74,144,226,0.2); color: #4a90e2; }

        .voice-list {
            margin-bottom: 16px;
        }

        .voice-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.15s;
            margin-bottom: 4px;
            position: relative;
            overflow: hidden;
        }
        .voice-item:hover { background: rgba(255,255,255,0.08); }
        .voice-item.selected { background: rgba(26,115,232,0.18); }

        /* Название голоса */
        .voice-item .vi-name { flex: 1; font-size: 14px; color: #e8eaed; }

        /* Иконка выбранного (галочка слева от статуса, синяя) */
        .voice-item .vi-sel {
            font-size: 16px; color: #1a73e8;
            margin-right: 6px; opacity: 0;
            transition: opacity 0.15s;
        }
        .voice-item.selected .vi-sel { opacity: 1; }

        /* Кнопка-статус справа */
        .vi-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            cursor: pointer;
            border: none; outline: none;
            transition: transform 0.15s, background 0.15s;
        }
        .vi-btn:hover { transform: scale(1.1); }

        /* Зелёная галочка — голос установлен */
        .vi-btn.vi-ok {
            background: #34a853;
            color: white;
            cursor: default;
        }

        /* Стрелка вниз — скачать */
        .vi-btn.vi-dl {
            background: rgba(255,255,255,0.12);
            color: #9aa0a6;
        }
        .vi-btn.vi-dl:hover { background: rgba(255,255,255,0.2); color: #e8eaed; }

        /* Полоска прогресса */
        .vi-progress {
            position: absolute; bottom: 0; left: 0;
            height: 2px; background: #1a73e8;
            transition: width 0.3s;
            border-radius: 1px;
        }

        .speed-section { margin-bottom: 16px; }
        .speed-section label { display: block; font-size: 11px; color: #9aa0a6; margin-bottom: 8px; text-transform: uppercase; }
        .speed-control input { width: 100%; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; -webkit-appearance: none; }
        .speed-control input::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #1a73e8; border: 2px solid white; border-radius: 50%; cursor: pointer; }
        .speed-markers { display: flex; justify-content: space-between; font-size: 9px; color: #9aa0a6; padding: 0 2px; }
        .speed-value { text-align: center; font-size: 13px; color: #1a73e8; margin-top: 6px; font-weight: 500; }

        .play-button {
            width: 100%;
            padding: 10px;
            background: #1a73e8;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .play-button:hover { background: #1765cc; }
        .play-button .material-icons { font-size: 18px; }

        .toc-panel {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100vh;
            background: rgba(32,33,36,0.98);
            backdrop-filter: blur(10px);
            transition: left 0.3s;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            color: white;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .toc-panel.visible { left: 0; }

        .toc-header {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .toc-tabs { display: flex; gap: 4px; }
        .toc-tab {
            background: transparent; border: none; cursor: pointer;
            color: rgba(255,255,255,.45); border-radius: 6px;
            padding: 6px 8px; display: flex; align-items: center;
            transition: background .15s, color .15s;
        }
        .toc-tab:hover  { background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); }
        .toc-tab.active { background: rgba(26,115,232,.25);  color: #7ab4f5; }
        .toc-tab .material-icons { font-size: 20px; }

        .toc-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        /* ── Flat item (обычная глава) ── */
        .toc-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .toc-item:hover { background: rgba(255,255,255,0.08); }
        .toc-item.level-2 { padding-left: 32px; font-size: 12px; color: rgba(255,255,255,.75); }
        .toc-item.level-3 { padding-left: 48px; font-size: 12px; color: rgba(255,255,255,.6);  }

        /* ── Collapsible group ── */
        .toc-group { }
        .toc-group-header {
            padding: 9px 12px 9px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
            color: #e8eaed;
        }
        .toc-group-header:hover { background: rgba(255,255,255,.08); }
        .toc-group-header .toc-arrow {
            font-size: 16px; color: rgba(255,255,255,.4);
            transition: transform .2s; flex-shrink: 0;
        }
        .toc-group-header .toc-arrow.open { transform: rotate(90deg); }
        .toc-group-children {
            overflow: hidden;
            max-height: 0;
            transition: max-height .25s ease;
        }
        .toc-group-children.open { max-height: 4000px; }
        .toc-group-children .toc-item { padding-left: 32px; }
        .toc-group-children .toc-group-header { padding-left: 28px; font-weight: 500; color: rgba(255,255,255,.85); }
        .toc-group-children .toc-group-children .toc-item { padding-left: 48px; }

        /* ── Search results ── */
        .search-result-item {
            padding: 9px 14px 8px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,.05);
            font-size: 12px;
            line-height: 1.6;
            transition: background .12s;
        }
        .search-result-item:hover { background: rgba(255,255,255,.08); }
        .search-result-item .sr-match {
            color: #e0e0e0;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .search-result-item .sr-match mark {
            background: transparent;
            color: #e74c3c;
            font-weight: 600;
            border: 1px solid rgba(231,76,60,.5);
            border-radius: 2px;
            padding: 0 1px;
        }
        .search-result-item .sr-chapter {
            color: #7ab4f5; font-size: 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .library-button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: none;
            width: 100%;
            cursor: pointer;
            color: white;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1999;
            display: none;
        }
        .overlay.visible { display: block; }

        /* Панель закладок — выезжает справа */
        .bookmarks-panel {
            position: fixed;
            top: 0;
            right: -340px;
            width: 320px;
            height: 100vh;
            background: rgba(32,33,36,0.98);
            backdrop-filter: blur(10px);
            transition: right 0.3s ease;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            color: white;
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .bookmarks-panel.visible { right: 0; }

        .add-bookmark-btn {
            margin: 8px 12px;
            padding: 9px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }
        .add-bookmark-btn:hover { background: rgba(255,255,255,0.15); }

        .bookmark-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            gap: 10px;
        }
        .bookmark-item:hover { background: rgba(255,255,255,0.05); }
        .bookmark-item .bm-label { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bookmark-item .bm-progress { font-size: 11px; color: #888; flex-shrink: 0; }
        .bookmark-item .bm-del {
            background: none; border: none; cursor: pointer;
            color: #e57373; font-size: 18px; line-height: 1; padding: 2px 4px;
        }
        .bookmark-active { color: #ffd54f !important; }

        #coverScreen {
            position: fixed; inset: 0;
            background: var(--bg-color, #f4ecd8);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 5000; gap: 16px;
        }
        #coverScreen img {
            max-height: 65vh; max-width: 70vw;
            object-fit: contain;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            border-radius: 4px;
        }
        #coverScreen .cover-title { font-size: 20px; font-weight: bold; text-align: center; }
        #coverScreen .cover-author { font-size: 14px; color: #888; }
        #coverScreen .cover-btn {
            margin-top: 8px;
            padding: 10px 28px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        /* Улучшенное контекстное меню */
        .selection-toolbar {
            position: fixed;
            background: #1e1e2e;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 2px;
            padding: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            z-index: 3000;
            transform: translateX(-50%) translateY(-110%);
        }
        .selection-toolbar.visible { display: flex; }

        .tts-highlight {
            background-color: #00CED1 !important;
            opacity: 0.5;
            border-radius: 2px;
            transition: opacity 0.2s;
        }

        /* Overlayer highlight прозрачность — хорошо видно на любом фоне */
        :root {
            --overlayer-highlight-opacity: 0.45;
            --overlayer-highlight-blend-mode: multiply;
        }

        .debug-panel {
            position: fixed;
            bottom: 70px;
            right: 20px;
            width: 550px;
            height: 450px;
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 8px;
            z-index: 3000;
            display: none;
            flex-direction: column;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 11px;
            overflow: hidden;
            user-select: text;
        }

        .debug-panel.visible { display: flex; }

        .debug-header {
            padding: 8px 12px;
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .debug-tabs {
            display: flex;
            gap: 2px;
            background: #252525;
            border-bottom: 1px solid #444;
        }

        .debug-tab {
            padding: 6px 12px;
            background: #2d2d2d;
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 11px;
            border-right: 1px solid #444;
        }

        .debug-tab.active {
            background: #1e1e1e;
            border-bottom: 2px solid #4caf50;
        }

        .debug-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
        }

        .debug-content.active {
            display: block;
        }

        .debug-stats {
            padding: 4px 8px;
            background: #252525;
            border-bottom: 1px solid #444;
            font-size: 10px;
            display: flex;
            gap: 16px;
        }

        .debug-stats span {
            color: #4caf50;
        }

        .debug-filter {
            padding: 4px 8px;

    <script type="module">
        import { makeBook } from './view.js';
        import { Overlayer } from './overlayer.js';

        window.makeBook = makeBook;

        // ==================== КОНФИГУРАЦИЯ ====================
        const VOICES = {
            'Edge': [
                { id: 'ru-RU-DmitryNeural',  name: 'Дмитрий', available: true },
                { id: 'ru-RU-SvetlanaNeural', name: 'Светлана', available: true }
            ],
            'Piper': [
                { id: 'ru_RU_irina_medium', name: 'Ирина', available: false, downloading: false, progress: 0, size: '~84 МБ' },
                { id: 'ru_RU_denis_medium', name: 'Денис',  available: false, downloading: false, progress: 0, size: '~83 МБ' },
                { id: 'ru_RU_dmitry_medium', name: 'Дмитрий', available: false, downloading: false, progress: 0, size: '~83 МБ' }
            ]
            // Системные движки добавляются динамически через detectSystemEngines()
        };

        // Реестр системных движков: { 'RHVoice': [{id, name, available}], ... }
        const SYSTEM_ENGINES = {};

        const STORAGE_KEY = 'tts_settings';
        const HIGHLIGHT_COLORS = {
            'red': '#ff4444', 'violet': '#b344ff', 'blue': '#4488ff', 'green': '#44ff44', 'yellow': '#ffdd44', 'cyan': '#00CED1'
        };

        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let bridge = null;
        let view = null;
        let book = null;
        let overlayer = null;
        let currentSection = 0;
        let bookReady = false; // Флаг готовности книги
        let currentBookPath = null; // Путь к текущей книге для работы с подсветками

        // TTS переменные
        let ttsActive = false;
        let ttsPaused = false;          // true = на паузе (подсветка сохранена, можно продолжить)
        let ttsSentences = [];          // [{name, text, range}] — предложения текущего блока
        let ttsSentenceIndex = 0;       // текущий индекс внутри ttsSentences
        let ttsSpeed = 1.0;
        let currentEngine = 'Piper';
        let currentVoice = 'ru_RU_irina_medium';
        let ttsPageTurning = false;     // флаг: идёт перелистывание / переход секции
        let pendingTTSStart = null;     // флаг: TTS ждёт готовности книги
        let ttsGlobalRepeatCount = 0;   // ГЛОБАЛЬНЫЙ счётчик повторов
        let ttsLastGlobalText = '';     // последний текст для глобальной проверки
        let ttsLastBlockSignature = ''; // «отпечаток» предыдущего блока (первые N слов) для пропуска дублей

        // Подсветка
        let currentSelection = null;
        let currentRange = null;
        let currentRangeDoc = null;   // doc (iframe) в котором был создан currentRange
        let currentStyle = 'highlight';
        let currentColor = 'blue';

        // ID текущей TTS подсветки
        let currentTTSHighlightId = null;
        
        // Цвет TTS-подсветки (настраивается через Python)
        let ttsHighlightColor = '#00CED1'; // По умолчанию — голубой
        let ttsHighlightColorName = 'cyan';
        
        // Хранилище пользовательских подсветок: {pythonId: overlayerId}
        const userHighlightMap = {};

        // ==================== ИНДИКАТОР ПОДСВЕТКИ ====================
        const highlightIndicator = document.getElementById('highlightIndicator');
        const highlightText = document.getElementById('highlightText');

        function showHighlightIndicator(text, success = true) {
            highlightIndicator.classList.add('active');
            if (success) {
                highlightText.textContent = `✅ Подсвечено: ${text.substring(0, 50)}...`;
                highlightIndicator.style.borderLeftColor = ttsHighlightColor;
            } else {
                highlightText.textContent = `❌ Не найдено: ${text.substring(0, 50)}...`;
                highlightIndicator.style.borderLeftColor = '#ff6b6b';
            }

            setTimeout(() => {
                highlightIndicator.classList.remove('active');
            }, 3000);
        }

        // ==================== ОТЛАДКА ====================
        const debugEl = document.getElementById('debugLogs');
        const highlightDebugEl = document.getElementById('debugHighlight');
        const domDebugEl = document.getElementById('debugDOM');
        const logCountSpan = document.getElementById('logCount');

        let logs = [];
        let logFilter = '';

        function log(msg, type = 'info', data = null) {
            const entry = {
                id: Date.now() + Math.random(),
                time: new Date(),
                type,
                message: msg,
                data
            };

            logs.push(entry);
            if (logs.length > 500) logs.shift();

            renderLogs();
            updateStats();

            console.log(`[${type}] ${msg}`, data || '');
        }

        function renderLogs() {
            if (!debugEl) return;

            const filtered = logs.filter(log => {
                if (!logFilter) return true;
                return log.message.toLowerCase().includes(logFilter) ||
                       (log.data && JSON.stringify(log.data).toLowerCase().includes(logFilter));
            });

            debugEl.innerHTML = filtered.map(log => {
                const timeStr = `${log.time.toLocaleTimeString()}.${log.time.getMilliseconds().toString().padStart(3, '0')}`;
                let dataStr = '';
                if (log.data) {
                    dataStr = ` <span style="color: #ffb86b">${JSON.stringify(log.data)}</span>`;
                }

                let color = '#0f0';
                if (log.type === 'error') color = '#ff6b6b';
                else if (log.type === 'warn') color = '#ffb86b';
                else if (log.type === 'tts') color = '#bd93f9';
                else if (log.type === 'highlight') color = '#ff79c6';
                else if (log.type === 'settings') color = '#8be9fd';
                else if (log.type === 'nav') color = '#8be9fd';

                return `<div class="debug-line"><span class="debug-time">[${timeStr}]</span> <span style="color: ${color}">[${log.type}]</span> ${log.message}${dataStr}</div>`;
            }).join('');

            debugEl.scrollTop = debugEl.scrollHeight;
        }

        function updateStats() {
            if (logCountSpan) {
                logCountSpan.textContent = logs.length;
            }

            // Обновляем вкладку подсветки
            if (highlightDebugEl) {
                highlightDebugEl.innerHTML = `
                    <div style="padding: 12px;">
                        <h4>📊 Статус</h4>
                        <p>Книга готова: ${bookReady ? '✅' : '❌'}</p>
                        <p>Overlayer готов: ${overlayer ? '✅' : '❌'}</p>
                        <p>Активная подсветка: ${currentTTSHighlightId ? currentTTSHighlightId : 'нет'}</p>
                        <hr>
                        <h4>🎨 Текущее предложение</h4>
                        <p>Индекс: ${ttsSentenceIndex + 1}/${ttsSentences.length}</p>

            if (domDebugEl && view?.renderer) {

        function safeAddListener(id, event, handler) {
            const el = document.getElementById(id);
            if (el) el.addEventListener(event, handler);

        // ==================== ПРОВЕРКА, ЧТО ВЫДЕЛЕНИЕ В КНИГЕ ====================
        function isSelectionInBook() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return false;

            const range = selection.getRangeAt(0);
            if (!range) return false;

            const container = document.getElementById('viewer-container');
            let node = range.startContainer;

            while (node) {
                if (node === container) return true;
                if (node === document.body) break;
                node = node.parentNode;
            }

            return false;
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            log('🚀 Запуск Readest...');

            view = document.getElementById('viewer');
            if (!view) {
                log('❌ Элемент viewer не найден', 'error');
                return;
            }

            // create-overlay срабатывает когда view.js создал и прикрепил Overlayer к новой секции.
            // НЕ создаём свой Overlayer вручную — он уже есть в getContents()[0].overlayer
            // Слушаем relocate от renderer (paginator) напрямую — там index надёжный
            view.addEventListener('load', ({ detail: { doc } }) => {
                // При load секции — узнаём индекс из getContents()
                try {
                    const contents = view.renderer?.getContents?.();
                    if (contents?.length > 0 && contents[0].index !== undefined) {
                        currentSection = contents[0].index;
                        log(`📖 Секция загружена: ${currentSection}`, 'nav');
                    }
                } catch(e) {}
            });

            view.addEventListener('create-overlay', () => {
                try {
                    const contents = view.renderer?.getContents();
                    if (contents && contents.length > 0 && contents[0].overlayer) {
                        overlayer = contents[0].overlayer;
                        log('✅ Overlayer получен для новой секции');
                    } else {
                        log('⚠️ Overlayer не найден в новой секции', 'warn');
                        overlayer = null;
                    }

                    // Если есть отложенный TTS, запускаем его
                    if (pendingTTSStart && bookReady) {
                        log('🔄 Запускаем отложенный TTS', 'tts');
                        pendingTTSStart = null;
                        setTimeout(() => startTTS(), 100);
                    }

                    updateStats();
                } catch(err) {
                    log(`❌ Ошибка получения Overlayer: ${err.message}`, 'error');
                }
            });

            // При загрузке каждой секции (новый iframe) — применяем тему
            view.addEventListener('load', ({ detail: { doc } }) => {
                // Повторно применяем стили т.к. новый iframe = чистый document
                setTimeout(() => applyTheme(), 0);
                if (!doc) return;
                // Инжектируем серый ::selection в iframe
                try {
                    const style = doc.createElement('style');
                    style.textContent = '::selection { background: rgba(140,140,140,0.35) !important; color: inherit !important; }';
                    (doc.head || doc.documentElement).appendChild(style);
                } catch(e) {}

                doc.addEventListener('pointerup', () => {
                    setTimeout(() => {
                        try {
                            const sel = doc.getSelection();
                            const text = sel?.toString().trim();
                            if (text && text.length > 1 && sel.rangeCount > 0) {
                                currentSelection = text;
                                currentRange = sel.getRangeAt(0);
                                currentRangeDoc = doc;   // запоминаем doc

                                // getBoundingClientRect() внутри iframe возвращает
                                // координаты в системе iframe (НЕ главного окна).
                                // При листании страниц (paginator scrolls #container)
                                // iframe съезжает влево — нужно добавить offset от
                                // frameElement.getBoundingClientRect() (в системе parent).
                                const selRect = currentRange.getBoundingClientRect();
                                const frameEl = doc.defaultView?.frameElement;
                                const frameRect = frameEl
                                    ? frameEl.getBoundingClientRect()
                                    : { left: 0, top: 0 };

                                const mainLeft = frameRect.left + selRect.left + selRect.width / 2;
                                const mainTop  = frameRect.top  + selRect.top;

                                const toolbar = document.getElementById('selectionToolbar');
                                
                                // Проверяем границы экрана
                                const toolbarHeight = 50; // примерная высота тулбара
                                const gap = 10;
                                
                                // Если выделение слишком высоко (менее 60px от верха), открываем ПОД выделением
                                if (mainTop < 60) {
                                    toolbar.style.transform = 'translate(-50%, 0)';
                                    toolbar.style.marginTop = '0px';
                                    toolbar.style.top = (mainTop + gap) + 'px';
                                } else {
                                    // Открываем НАД выделением (по умолчанию)
                                    toolbar.style.transform = 'translate(-50%, -100%)';
                                    toolbar.style.marginTop = '-8px';
                                    toolbar.style.top = mainTop + 'px';
                                }
                                
                                toolbar.style.left = mainLeft + 'px';
                                toolbar.classList.add('visible');

                                // Обновляем иконку кнопки подсветки
                                updateHighlightButtonIcon();
                            } else {
                                document.getElementById('selectionToolbar').classList.remove('visible');
                                document.getElementById('miniPalette').classList.remove('visible');
                            }
                        } catch(e) {}
                    }, 50);
                });
                
                // Клик по изображению для открытия комикса в полном экране
                doc.addEventListener('click', (e) => {
                    if (e.target.tagName === 'IMG' && window.currentBookData?.type === 'cbz') {
                        const comicModal = document.getElementById('comicViewerModal');
                        const comicImg = document.getElementById('comicViewerImg');
                        if (comicModal && comicImg) {
                            const src = e.target.src;
                            if (src && src.startsWith('blob:')) {
                                comicImg.src = src;
                                comicModal.classList.add('visible');
                                log('📖 Комикс: открыт просмотр', 'info');
                            }
                        }
                    }
                });
                doc.addEventListener('pointerdown', () => {
                    document.getElementById('selectionToolbar').classList.remove('visible');
                    document.getElementById('miniPalette').classList.remove('visible');
                });
                
                // Обработка кликов по сноскам
                doc.addEventListener('click', (e) => {
                    const a = e.target.closest('a[href]');
                    if (!a || !window.footnoteHandler) return;
                    try {
                        const href = a.getAttribute('href');
                        if (href) {
                            window.footnoteHandler.handle(book, {
                                detail: { a, href },
                                preventDefault: () => e.preventDefault()
                            });
                        }
                    } catch(err) {
                        log('⚠️ Сноска: ' + err.message, 'warn');
                    }
                }, true);
            });

            // Слушаем перемещение по книге (смена секции И перелистывание страниц)
            // ВАЖНО: foliate-js отдаёт индекс секции в e.detail.section.current,
            // НЕ в e.detail.index (e.detail.index не существует в foliate-js)
            view.addEventListener('relocate', (e) => {
                // Получаем индекс секции из правильного поля
                const sectionIdx = e.detail?.section?.current;
                const prevSection = currentSection;

                if (sectionIdx !== undefined) {
                    currentSection = sectionIdx;
                }

                // updatePageInfo вызываем на КАЖДЫЙ relocate (смена секции И перелистывание)
                updatePageInfo();

                if (sectionIdx !== undefined && sectionIdx !== prevSection) {
                    // Смена секции — доп. обновления
                    if (bridge?.onSectionChanged) {
                        bridge.onSectionChanged(currentSection);
                    }

                    // Обновляем ссылку на overlayer
                    try {
                        const contents = view.renderer?.getContents();
                        if (contents && contents.length > 0 && contents[0].overlayer) {
                            overlayer = contents[0].overlayer;
                        }
                    } catch(err) {}

                    updateBookmarkButton();
                    updateStats();

                    // Применяем подсветки для новой секции
                    if (window.savedHighlights) {
                        applyHighlightsForCurrentSection();
                    }
                }
                // Сохраняем на каждый relocate (включая смен�� страницы внутри секции)
                autoSavePosition();
            });

            // Подключаем WebChannel
            try {
                if (typeof QWebChannel !== 'undefined') {
                    new QWebChannel(qt.webChannelTransport, (channel) => {
                        bridge = channel.objects.readerBridge;
                        log('✅ WebChannel подключен');

                        if (bridge) {
                            bridge.getBookData((data) => {
                                if (data) {
                                    try {
                                        const parsed = JSON.parse(data);
                                        data = null;  // освобождаем строку до loadBook
                                        loadBook(parsed);
                                    } catch(e) {
                                        log(`❌ Ошибка парсинга книги: ${e.message}`, 'error');
                                    }
                                }
                            });

                            bridge.getTheme((theme) => {
                                try {
                                    const t = JSON.parse(theme);
                                    document.documentElement.style.setProperty('--bg-color', t.bg);
                                    document.documentElement.style.setProperty('--text-color', t.text);
                                } catch(e) {}
                            });

                            loadTTSSettings();
                            checkPiperVoices();
                            detectSystemEngines();
                        }
                    });
                }
            } catch(e) {
                log('❌ Ошибка WebChannel: ' + e.message, 'error');
            }

            initUI();
            initSelectionHandlers();
        }

        // ==================== FB2: вспомогательные функции ====================

        // Показывает спиннер поверх экрана ДО парсинга FB2 — устраняет белый экран
        function showFB2LoadingBanner(bookName) {
            document.getElementById('fb2LoadingBanner')?.remove();
            const d = document.createElement('div');
            d.id = 'fb2LoadingBanner';
            d.style.cssText = [
                'position:fixed;inset:0;z-index:9000;',
                'background:var(--bg-color,#f4ecd8);',
                'display:flex;flex-direction:column;align-items:center;',
                'justify-content:center;gap:16px;',
            ].join('');

            d.innerHTML = `
                <div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#aaa;">ЗАГРУЗКА</div>
                <div style="font-size:22px;font-weight:600;max-width:560px;text-align:center;line-height:1.4;">${displayName}</div>
                <div style="width:40px;height:40px;border:3px solid rgba(0,0,0,.12);
                     border-top-color:#6c5ce7;border-radius:50%;
                     animation:spin 0.8s linear infinite;"></div>
                <div style="font-size:13px;color:#888;">Разбираем главы…</div>`;

        // Плавно скрывает баннер загрузки FB2
        function hideFB2LoadingBanner() {
            const d = document.getElementById('fb2LoadingBanner');
            if (!d) return;
            d.style.transition = 'opacity 0.3s ease';
            d.style.opacity = '0';
            setTimeout(() => d.remove(), 350);
        }

        // ==================== ЗАГРУЗКА КНИГИ ====================
        async function loadBook(bookData) {
            // currentBookData не сохраняем — освобождаем после loadBook
            try {
                log(`📖 Загрузка: ${bookData.name}`);

                // Устанавливаем путь к текущей книге
                currentBookPath = bookData.path || null;

                // ── FB2: показываем спиннер ДО парсинга ──────────────────────
                // Белый экран возникал потому что парсинг 15 МБ XML полностью
                // блокирует JS на 3–10 с. Теперь пользователь видит спиннер,
                // а не пустой экран.
                if (bookData.type === 'fb2') showFB2LoadingBanner(bookData.name);

                // ── Создаём File-объект через fetch(file://) ─────────────────
                // --disable-web-security + --allow-file-access-from-files позволяют
                // читать локальные файлы напрямую без base64-кодирования.
                // Выигрыш по памяти для 15 МБ книги:
                //   base64: Python(20МБ) + JS-строка(20МБ) + Uint8Array(15МБ) = ~55МБ пиковых
                //   fetch:  ArrayBuffer(15МБ) = ~15МБ пиковых
                const mimeTypes = {
                    epub: 'application/epub+zip',
                    fb2:  'application/x-fictionbook+xml',
                    cbz:  'application/vnd.comicbook+zip',
                    pdf:  'application/pdf',
                    mobi: 'application/x-mobipocket-ebook',
                };
                const mime = mimeTypes[bookData.type] || 'application/octet-stream';

                let file;
                if (bookData.file_url) {
                    // Основной путь: прямое чтение с диска
                    log(`📂 Прямая загрузка: ${bookData.file_url}`);
                    const resp = await fetch(bookData.file_url);
                    if (!resp.ok) throw new Error(`fetch failed: ${resp.status} ${resp.statusText}`);
                    const arrayBuffer = await resp.arrayBuffer();
                    file = new File([arrayBuffer], bookData.name, { type: mime });
                } else if (bookData.content) {
                    // Запасной путь: base64 (на случай регресса)
                    log('⚠️ Fallback: base64 decode (file_url отсутствует)');
                    const binary = atob(bookData.content);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    file = new File([bytes], bookData.name, { type: mime });
                } else {
                    throw new Error('Нет данных книги: ни file_url, ни content');
                }

                // Уничтожаем предыдущую книгу перед созданием новой.
                // book.destroy() отзывает все активные Blob URL — без этого вызова
                // они остаются в памяти при каждом открытии новой книги (утечка).
                if (book && typeof book.destroy === 'function') {
                    try { book.destroy() } catch(e) {}
                    book = null
                }

                book = await makeBook(file);
                // Парсинг завершён — скрываем баннер
                hideFB2LoadingBanner();
                log(`✅ Книга создана (${book.sections?.length || 0} секций)`);
                
                // Проверка для PDF
                if (bookData.type === 'pdf') {
                    log(`📄 PDF: ${book.sections?.length || 0} страниц`, 'info');
                    if (!book.sections || book.sections.length === 0) {
                        log('❌ PDF: Нет страниц!', 'error');
                    }
                    if (!book.rendition) {
                        log('⚠️ PDF: Нет rendition, устанавливаем pre-paginated', 'warn');
                        book.rendition = { layout: 'pre-paginated' };
                    }
                }

                // Метаданные
                if (book.metadata) {
                    const title = book.metadata.title || bookData.name;
                    document.getElementById('bookTitle').textContent = title;
                    let authorText = '';
                    const author = book.metadata.author;
                    if (typeof author === 'string') authorText = author;
                    else if (Array.isArray(author)) authorText = author.map(a => a?.name || a).join(', ');
                    else if (author?.name) authorText = author.name;
                    document.getElementById('bookAuthor').textContent = authorText;
                    
                    // Показываем информацию в панели оглавления
                    showBookInfoInPanel(title, authorText, bookData.type);
                }

                // Загружаем настройки из Python/config
                if (bridge) {
                    bridge.getSettings(s => {
                        try { applyAllSettings(JSON.parse(s)); } catch(e) {}
                    });
                }

                await view.open(book);
                log('✅ Книга открыта');

                // Инициализируем обработчик сносок
                let footnoteHandler = null;
                try {
                    const { FootnoteHandler } = await import('./foliate-js/footnotes.js');
                    footnoteHandler = new FootnoteHandler();
                    footnoteHandler.addEventListener('render', (e) => {
                        const { view: fnView } = e.detail;
                        showFootnote(fnView);
                    });
                    log('✅ FootnoteHandler инициализирован', 'footnote');
                } catch(e) {
                    log('⚠️ FootnoteHandler: ' + e.message, 'warn');
                }
                window.footnoteHandler = footnoteHandler;

                if (view.renderer) {
                    view.renderer.setAttribute('spread', 'auto');

                    // 1. Пр��������������меняем стили ДО init() — так setStyles сохраняет CSS
                    //    и paginator применит его при загрузке первой секции.
                    //    Порядок: setStyles → section load → fonts.ready → expand()
                    //    → scrollToAnchor(#anchor). Якорь из init() не потеряется.
                    applyTheme();

                    // 2. Загружаем настройки (async, применятся поверх дефолтной темы)
                    if (bridge) {
                        bridge.getSettings(s => {
                            try { applyAllSettings(JSON.parse(s)); } catch(e) {}
                        });
                    }

                    // 3. Получаем с������хранённую позицию
                    let lastLocation = null;
                    if (bridge) {
                        const posJson = await new Promise(r => bridge.getPosition(r));
                        try {
                            const saved = JSON.parse(posJson);
                            const pos = saved?.position;
                            if (pos?.cfi) lastLocation = pos.cfi;
                            else if (pos?.section > 0) lastLocation = pos.section;
                        } catch(e) {}
                    }

                    const bookTitle = document.getElementById('bookTitle').textContent || '';
                    const bookAuthor = document.getElementById('bookAuthor').textContent || '';

                    if (lastLocation) {
                        // ── ПОВТОРНОЕ ОТКРЫТИЕ ──
                        // Показываем тайтл-оверлей, пока view.init() загружает секцию.
                        // view.init({ lastLocation }) устанавливает #anchor в пагинаторе
                        // ДО загрузки шрифтов, поэтому fonts.ready → expand() корректно
                        // восстанавливает позицию даже после перекладки.
                        log(`📌 ����осстановление позиции: ${JSON.stringify(lastLocation).substring(0, 60)}`, 'nav');
                        showReturnOverlay(bookTitle, bookAuthor);
                        await view.init({ lastLocation });
                        // Пауза — даём пользователю увидеть тайтл ~400мс
                        await new Promise(r => setTimeout(r, 400));
                        dismissReturnOverlay();
                        log('✅ Позиция восстановлена', 'nav');
                    } else {
                        // ── ПЕРВОЕ ОТКРЫТИЕ ──
                        // Показываем обложку с кнопкой "Читать".
                        // Кнопка запускает view.init({}) → загружает секцию 0.
                        showFirstOpenScreen(bookTitle, bookAuthor, book);
                    }

                    // 4. К��ига готова — запускаем логику, зависящую от bookReady
                    bookReady = true;
                    log('✅ Книга полностью загружена и готова');
                    updateStats();
                    loadBookmarks();
                    loadHighlights(); // Загружаем и применяем сохранённые подсветки
                }

                if (book.toc) renderToc(book.toc);

            } catch(e) {
                // КРИТИЧНО: всегда скрываем баннер даже при ошибке —
                // иначе спиннер зависает навсегда и приложение кажется замёрзшим.
                hideFB2LoadingBanner();
                log('❌ Ошибка загрузки: ' + (e?.message ?? String(e)), 'error');
                console.error('[loadBook] ошибка:', e);
            }
        }

        // ── ОВЕРЛЕЙ ДЛЯ ПОВТОРНОГО ОТКРЫТИЯ ──
        // Показывается поверх книги пока view.init() грузит секцию,
        // затем плавно исчезает (~400мс). Пользователь видит название
        // книги на долю секунды, потом появляется нужная страница.

        function showReturnOverlay(title, author) {
            document.getElementById('coverScreenEl')?.remove();
            const div = document.createElement('div');
            div.id = 'coverScreenEl';
            div.style.cssText = [
                'position:fixed;inset:0;z-index:5000;',
                'background:var(--bg-color,#f4ecd8);',
                'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;',
                'transition:opacity 0.3s ease;',
            ].join('');
            div.innerHTML = `
                <div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#aaa;">ЗАГРУЗКА</div>
                <div style="font-size:26px;font-weight:bold;text-align:center;max-width:560px;line-height:1.35;">${title}</div>
                ${author ? `<div style="font-size:16px;color:#888;">${author}</div>` : ''}
                <div style="width:48px;height:2px;background:#6c5ce7;margin-top:4px;"></div>
            `;
            document.getElementById('app').appendChild(div);
        }

        function dismissReturnOverlay() {
            const el = document.getElementById('coverScreenEl');
            if (!el) return;
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 320);
        }

        // ── ЭКРАН ПЕРВОГО ОТКРЫТИЯ ──
        // Показывает обложку или тайтл с кнопкой "Читать".
        // При нажатии кнопки запускает view.init({}) — загружает первую секцию.

        async function showFirstOpenScreen(title, author, bookObj) {
            // Пробуем получить обложку EPUB
            if (bookObj?.getCover) {
                try {
                    const blob = await bookObj.getCover();
                    if (blob?.size > 0) {
                        const url = URL.createObjectURL(blob);
                        showCoverScreen(url, title, author, async () => {
                            URL.revokeObjectURL(url);
                            await view.init({});
                        });
                        return;
                    }
                } catch(e) {}
            }
            // Тайтл-экран для FB2 и EPUB без обложки
            showTitleScreen(title, author, async () => {
                await view.init({});
            });

        function showCoverScreen(imgUrl, title, author, onRead) {

            document.getElementById('coverScreenEl')?.remove();

        function showTitleScreen(title, author, onRead) {

            const div = document.createElement('div');

                ${author ? `<div style="font-size:18px;color:#888;margin-top:4px;">${author}</div>` : ''}

                <button style="margin-top:8px;padding:10px 28px;background:#6c5ce7;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;">Читать</button>

        // ── НАСТРОЙКИ ──

        // ── КЛЮЧЕВОЕ ОТКРЫТИЕ ──
        // Foliate-js рендерит каждую секцию в <iframe> с изолированным document.
        // CSS переменные главной страницы НЕВИДИМЫ внутри iframe.
        // Единственный правильный способ применить тему — через
        // renderer.setStyles(cssString), который инжектирует <style> в <head> iframe.
        //
        // Именно так делает официальный foliate-js reader.js:
        //   this.view.renderer.setStyles(getCSS(this.style))
        //
        // Фоновый цвет частично работал случайно: paginator.js читает
        // getBackground(doc) из самого документа EPUB и применяет его к
        // #background div снаружи iframe — но это не цвет из наших настроек.

        // Текущие настройки темы (хранятся здесь, применяются при каждой загрузке секции)
        let themeSettings = {
            bg: '#f4ecd8',
            text: '#5b4636',
            fontSize: 16,
            lineHeight: 1.5,
        };

        // Генерирует CSS строку для инжекции в iframe (аналог getCSS в reader.js)
        function getThemeCSS() {
            return `
                html, body {
                    color: ${themeSettings.text} !important;
                    background: ${themeSettings.bg} !important;
                    margin: 0 !important;
                    padding: 0 !important;
                }
                p, li, blockquote, dd, h1, h2, h3, h4, h5, h6, span, a {
                    color: ${themeSettings.text} !important;
                    font-size: ${themeSettings.fontSize}px;
                    line-height: ${themeSettings.lineHeight};
                }
                a { color: inherit !important; }
                /* Центрирование заголовков как в FB2 */
                h1, h2, h3, h4, h5, h6 {
                    text-align: center !important;
                    background: transparent !important;
                    margin: 1em 0 !important;
                    padding: 0 !important;
                    border: none !important;
                }
                /* Убираем белый фон у заголовков и других элементов */
                * {
                    background-color: transparent !important;
                    margin: 0 !important;
                    padding: 0 !important;
                }
                /* Убираем все рамки */
                * {
                    border: none !important;
                    outline: none !important;
                    box-shadow: none !important;
                }
                /* Сохраняем фон только у body */
                html, body {
                    background: ${themeSettings.bg} !important;
                }
                /* Особые стили для EPUB элементов */
                body > * {
                    background: transparent !important;
                }
                img {
                    max-width: 100%;
                    height: auto;
                }
            `;
        }

        // Применяет тему через renderer.setStyles — единственный правильный способ
        /**
         * Вычисляет относительную яркость hex-цвета (0 = чёрный, 1 = белый).
         * Использует формулу W3C WCAG 2.0.
         */
        function _bgLuminance(hex) {
            try {
                const h = hex.replace('#', '');
                const r = parseInt(h.substring(0, 2), 16) / 255;
                const g = parseInt(h.substring(2, 4), 16) / 255;
                const b = parseInt(h.substring(4, 6), 16) / 255;
                const toLinear = c => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
                return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
            } catch(e) { return 0.5; }
        }

        /** Обновляет CSS-переменные цвета TTS-кнопок под текущую тему. */
        function updateTTSBtnColors() {
            const bg = themeSettings.bg || '#f4ecd8';
            const lum = _bgLuminance(bg);
            const root = document.documentElement;
            if (lum > 0.4) {
                // Светлый фон — тёмные кнопки
                root.style.setProperty('--tts-btn-color',  'rgba(60, 60, 60, 0.80)');
                root.style.setProperty('--tts-btn-hover',  'rgba(0, 0, 0, 1.0)');
                root.style.setProperty('--tts-btn-shadow', 'drop-shadow(0 1px 2px rgba(0,0,0,0.2))');
            } else {
                // Тёмный фон — светлые кнопки
                root.style.setProperty('--tts-btn-color',  'rgba(200, 200, 200, 0.85)');
                root.style.setProperty('--tts-btn-hover',  'rgba(255, 255, 255, 1.0)');
                root.style.setProperty('--tts-btn-shadow', 'drop-shadow(0 1px 3px rgba(0,0,0,0.5))');
            }
        }

        function applyTheme() {
            if (view?.renderer?.setStyles) {
                view.renderer.setStyles(getThemeCSS());
                log('🎨 Тема применена через renderer.setStyles', 'tts');
            }
            // Также применяем фон к главной странице (для letterbox вокруг книги)
            document.documentElement.style.setProperty('--bg-color', themeSettings.bg);
            document.documentElement.style.setProperty('--text-color', themeSettings.text);
            updateTTSBtnColors();  // адаптируем цвет TTS-кнопок под фон
        }

        function applyAllSettings(s) {
            if (!s) return;
            if (s.theme_bg)    themeSettings.bg = s.theme_bg;
            if (s.theme_text)  themeSettings.text = s.theme_text;
            if (s.font_size)   themeSettings.fontSize = parseInt(s.font_size);
            if (s.line_height) themeSettings.lineHeight = parseFloat(s.line_height);
            if (s.spread_mode && view?.renderer) view.renderer.setAttribute('spread', s.spread_mode);
            if (s.page_margin !== undefined) applyPageMargin(s.page_margin);
            if (s.default_highlight_style) {
                currentStyle = s.default_highlight_style;
                log(`📝 Стиль подсветки: ${currentStyle}`, 'settings');
            } else {
                log(`⚠️ Стиль подсветки не указан, используем по умолчанию: highlight`, 'settings');
            }
            // default_highlight_color больше не используется (оставлен только для совместимости)

            // Применяем цвет TTS-подсветки
            if (s.tts_highlight_color) {
                ttsHighlightColorName = s.tts_highlight_color;
                const ttsColorMap = {
                    'cyan': '#00CED1',
                    'red': '#ff4444',
                    'green': '#44ff44',
                    'yellow': '#ffdd44',
                    'pink': '#ff66b3',
                    'blue': '#4488ff',
                    'violet': '#b344ff',
                };
                ttsHighlightColor = ttsColorMap[s.tts_highlight_color] || '#00CED1';
                log(`🎨 TTS цвет применён: ${s.tts_highlight_color} (${ttsHighlightColor})`, 'settings');
            } else {
                log(`⚠️ TTS цвет не указан в настройках, используем по умолчанию: ${ttsHighlightColor}`, 'settings');
            }

            // Применяем TTS движок и голос из Python настроек
            // МИГРАЦИЯ: если Python вернул Edge — переключаем на Piper и сохраняем
            if (s.tts_engine) {
                const engineFromPython = s.tts_engine;
                if (engineFromPython === 'Edge') {
                    currentEngine = 'Piper';
                    currentVoice = 'ru_RU_irina_medium';
                    log('🔄 Миграция Python config: Edge → Piper', 'tts');
                    // Сохраняем в Python чтобы при следующем запуске уже было Piper
                    if (bridge) {
                        bridge.saveSetting(JSON.stringify({ key: 'preferred_engine', value: 'Piper' }));
                        bridge.saveSetting(JSON.stringify({ key: 'tts_engine', value: 'Piper' }));
                        bridge.saveSetting(JSON.stringify({ key: 'tts_voice', value: 'ru_RU_irina_medium' }));
                        bridge.setPreferredEngine('Piper');
                        bridge.setVoice('ru_RU_irina_medium');
                    }
                } else {
                    currentEngine = engineFromPython;
                    if (s.tts_voice) currentVoice = s.tts_voice;
                }
                const engineSelect = document.getElementById('engineSelect');
                if (engineSelect) engineSelect.value = currentEngine;
                // Явно синхронизируем Python контроллер с текущим движком
                // Без этого Python может держать Edge даже если JS показывает Piper
                if (bridge) {
                    bridge.setPreferredEngine(currentEngine);
                    if (currentVoice) bridge.setVoice(currentVoice);
                }
                log(`🎙️ TTS движок: ${currentEngine}`, 'settings');
            }
            if (s.tts_speed) {
                ttsSpeed = parseFloat(s.tts_speed);
                const speedSlider = document.getElementById('speedSlider');
                const speedValue = document.getElementById('speedValue');
                if (speedSlider) speedSlider.value = ttsSpeed;
                if (speedValue) speedValue.textContent = ttsSpeed + 'x';
                log(`⚡ TTS скорость: ${ttsSpeed}x`, 'settings');
            }

            applyTheme();
        }

        // Приёмник настроек от Python SettingsWindow
        window.applySettingFromPython = function(key, value) {
            switch(key) {
                case 'font_size':
                    themeSettings.fontSize = parseInt(value);
                    applyTheme();
                    break;
                case 'line_height':
                    themeSettings.lineHeight = parseFloat(value);
                    applyTheme();
                    break;
                case 'spread_mode':
                    if (view?.renderer) view.renderer.setAttribute('spread', value);
                    break;
                case 'page_margin':
                    applyPageMargin(value);
                    break;
                case 'default_highlight_style':
                    currentStyle = value;
                    break;
                case 'default_highlight_color':
                    currentColor = value;
                    break;
                case 'tts_highlight_color':
                    // Применяем цвет TTS-подсветки из Python
                    ttsHighlightColorName = value;
                    // Преобразуем имя цвета в hex код
                    const ttsColorMap = {
                        'cyan': '#00CED1',
                        'red': '#f28b82',
                        'green': '#81c995',
                        'yellow': '#fdd66b',
                        'pink': '#ff8b8b',
                    };
                    ttsHighlightColor = ttsColorMap[value] || '#00CED1';
                    log(`🎨 Цвет TTS-подсветки изменён: ${value} (${ttsHighlightColor})`, 'tts');
                    break;
                case 'theme':
                    themeSettings.bg = value.bg;
                    themeSettings.text = value.text;
                    applyTheme();
                    break;
                case 'theme_bg':
                    themeSettings.bg = value;
                    applyTheme();
                    break;
                case 'theme_text':
                    themeSettings.text = value;
                    applyTheme();
                    break;
            }
        };
        window.setSpreadMode = v => view?.renderer?.setAttribute('spread', v);
        window.setPageMargin = v => applyPageMargin(v);
        window.updateHighlightStyle = v => { currentStyle = v; };
        window.updateHighlightColor = v => { currentColor = v; };

        function applyPageMargin(px) {
            if (view?.renderer) {
                view.renderer.style.setProperty('--_margin', px + 'px');
            }
            document.documentElement.style.setProperty('--page-margin', px + 'px');
        }

        // ── АВТОСОХРАНЕНИЕ ПОЗИЦИИ (CFI) ──
        // Сохраняет точную позицию (CFI = секция + смещение в DOM).
        // Вызывается на каждый relocate — включая листание страниц внутри секции.
        // Дебаунс 300мс чтобы не спамить, но при закрытии — принудительный flush.

        let _savePositionTimer = null;
        let _pendingSavePos = null;

        function autoSavePosition() {
            if (!bridge || !bookReady) return;
            try {
                const loc = view?.lastLocation;
                const cfi = loc?.cfi ?? null;
                const section = currentSection;
                _pendingSavePos = { section, cfi };
            } catch(e) { return; }

            clearTimeout(_savePositionTimer);
            _savePositionTimer = setTimeout(() => flushSavePosition(), 300);
        }

        function flushSavePosition() {
            clearTimeout(_savePositionTimer);
            _savePositionTimer = null;
            if (!_pendingSavePos || !bridge || !bookReady) return;
            const { section, cfi } = _pendingSavePos;
            _pendingSavePos = null;
            const pos = JSON.stringify({ section, cfi });
            const progress = section / Math.max(1, (book?.sections?.length || 1) - 1);
            bridge.savePosition(pos, Math.min(1, progress));
            log(`💾 Позиция: секция ${section + 1}, CFI=${cfi ? cfi.substring(0, 40) + '...' : 'нет'}`, 'nav');
        }

        // При закрытии вкладки/окна — сохраняем немедленно
        window.addEventListener('beforeunload', () => flushSavePosition());

        function updatePageInfo() {
            if (!view) return;
            const pageInfo = document.getElementById('pageInfo');
            const progressInfo = document.getElementById('progressInfo');
            if (!pageInfo) return;

            const loc = view.lastLocation;
            // foliate-js считает «location» как chars/1500 ≈ страница
            // location.current / location.total даёт номер страницы книги
            if (loc?.location?.total > 0) {
                pageInfo.textContent = `${loc.location.next || loc.location.current} / ${loc.location.total}`;
            } else if (loc?.section) {
                pageInfo.textContent = `${loc.section.current + 1} / ${loc.section.total}`;
            } else {
                pageInfo.textContent = `${currentSection + 1} / ${book?.sections?.length || 0}`;
            }

            if (progressInfo) {
                const fraction = loc?.fraction || 0;
                progressInfo.textContent = `${Math.round(fraction * 100)}%`;
            }
        }

        // ── Helpers ──────────────────────────────────────────────────
        async function tocNavigate(href) {
            if (!href || !book?.resolveHref) return;
            try {
                const result = await book.resolveHref(href);
                if (result?.index !== undefined) { view.goTo(result.index); toggleToc(); setTimeout(() => loadHighlights(), 300); }
            } catch(e) {}
        }

        // Определить: является ли узел «группой» (часть/книга в сборнике)?
        // Группа = имеет дочерние элементы И её label не похожа на обычную главу.
        function isGroupNode(item, depth) {
            if (!item.subitems?.length) return false;
            // Всегда группа если depth=0 и есть дети
            if (depth === 0) return true;
            // На глубине 1: группа если дочерние тоже имеют детей (составная структура)
            const childrenHaveChildren = item.subitems.some(c => c.subitems?.length > 0);
            return childrenHaveChildren;
        }

        // Детектируем: нужна ли вообще иерархия?
        function needsHierarchy(toc) {
            // Иерархия нужна если хотя бы один top-level узел имеет детей
            // И дети тоже имеют детей (значит это не просто "части с главами")
            // ИЛИ если top-level узлов с детьми > 1 (сборник из книг)
            const withChildren = toc.filter(n => n.subitems?.length > 0);
            if (withChildren.length === 0) return false;      // flat — нет подуровней
            // Проверяем глубину: если у детей тоже есть дети — точно нужна иерархия
            const deep = withChildren.some(n => n.subitems.some(c => c.subitems?.length > 0));
            if (deep) return true;
            // Или если несколько top-level групп (части книги)
            return withChildren.length >= 2;
        }

        function renderToc(toc) {
            const container = document.getElementById('tocContent');
            if (!container) return;
            container.innerHTML = '';

            if (!needsHierarchy(toc)) {
                // ── Плоский вид: обычная книга с главами ──────────────────
                function renderFlat(items, level) {
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'toc-item level-' + level;
                        div.textContent = item.label || '';
                        div.onclick = () => tocNavigate(item.href);
                        container.appendChild(div);
                        if (item.subitems?.length) renderFlat(item.subitems, level + 1);
                    });
                }
                renderFlat(toc, 1);
                return;
            }

            // ── Иерархический вид: сборник или книга с частями ────────────
            function renderHierarchy(items, parent, depth) {
                items.forEach(item => {
                    const hasKids = item.subitems?.length > 0;

                    if (hasKids) {
                        // Группа (книга / часть)
                        const group = document.createElement('div');
                        group.className = 'toc-group';

                        const header = document.createElement('div');
                        header.className = 'toc-group-header';
                        if (depth > 0) header.style.paddingLeft = (14 + depth * 16) + 'px';

                        const arrow = document.createElement('span');
                        arrow.className = 'material-icons toc-arrow';
                        arrow.textContent = 'chevron_right';

                        const lbl = document.createElement('span');
                        lbl.textContent = item.label || '';
                        lbl.style.flex = '1';

                        header.appendChild(arrow);
                        header.appendChild(lbl);

                        const children = document.createElement('div');
                        children.className = 'toc-group-children';

                        // Первая группа открыта по умолчанию
                        if (depth === 0 && parent.children.length === 0) {
                            children.classList.add('open');
                            arrow.classList.add('open');
                        }

                        header.onclick = (e) => {
                            const isOpen = children.classList.toggle('open');
                            arrow.classList.toggle('open', isOpen);
                            // Клик по названию раздела тоже может быть навигацией
                        };
                        // Долгий тап / правый клик на заголовок — перейти к этой части
                        lbl.ondblclick = () => tocNavigate(item.href);

                        group.appendChild(header);
                        group.appendChild(children);
                        parent.appendChild(group);
                        renderHierarchy(item.subitems, children, depth + 1);
                    } else {
                        // Лист (глава)
                        const div = document.createElement('div');
                        div.className = 'toc-item';
                        if (depth > 0) div.style.paddingLeft = (32 + depth * 16) + 'px';
                        div.textContent = item.label || '';
                        div.onclick = () => tocNavigate(item.href);
                        parent.appendChild(div);
                    }
                });
            }
            renderHierarchy(toc, container, 0);
        }

        // ══════════════════════════════════════════════════════════════
        //  ПОИСК ПО КНИГЕ
        // ══════════════════════════════════════════════════════════════
        let _searchAbort = null;

        function switchTocTab(tab) {
            const tocContent    = document.getElementById('tocContent');
            const searchPane    = document.getElementById('tocSearchPane');
            const tabToc        = document.getElementById('tabToc');
            const tabSearch     = document.getElementById('tabSearch');

            if (tab === 'search') {
                tocContent.style.display  = 'none';
                searchPane.style.display  = 'flex';
                tabSearch.classList.add('active');
                tabToc.classList.remove('active');
                document.getElementById('bookSearchInput')?.focus();
            } else {
                tocContent.style.display  = '';
                searchPane.style.display  = 'none';
                tabToc.classList.add('active');
                tabSearch.classList.remove('active');
            }
        }

        async function runBookSearch(query) {
            const resultsEl = document.getElementById('bookSearchResults');
            const statusEl  = document.getElementById('bookSearchStatus');
            if (!resultsEl || !statusEl) return;

            resultsEl.innerHTML = '';
