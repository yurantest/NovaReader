            if (view?.clearSearch) view.clearSearch();

            if (!query.trim()) { statusEl.textContent = ''; return; }
            if (!view)          { statusEl.textContent = 'Книга не загружена'; return; }

            // Оптимизация: для длинных фраз (>10 слов) ищем только по первым 5 словам
            const words = query.trim().split(/\s+/);
            const searchQuery = words.length > 10 ? words.slice(0, 5).join(' ') : query;
            if (words.length > 10) {
                statusEl.textContent = `Длинный запрос: ищем по первым ${Math.min(5, words.length)} словам...`;
            }

            statusEl.textContent = 'Поиск…';
            if (_searchAbort) _searchAbort();
            let aborted = false;
            _searchAbort = () => { aborted = true; };

            // Таймаут: если за 30 сек ничего не найдено — считаем «не найдено»
            const timeoutId = setTimeout(() => {
                if (!aborted) {
                    aborted = true;
                    if (!resultsEl.children.length)
                        statusEl.textContent = 'Ничего не найдено';
                }
            }, 30000);

            try {
                let count = 0;
                const MAX = 300;  // Увеличим лимит для больших книг

                let sectionCount = 0;
                for await (const result of view.search({ query: searchQuery })) {
                    if (aborted) break;

                    // Отдаём управление браузеру КАЖДУЮ секцию — предотвращает зависание
                    sectionCount++;
                    if (sectionCount % 3 === 0) {
                        await new Promise(r => setTimeout(r, 10));  // 10мс пауза
                        if (aborted) break;
                    }

                    if (!result.subitems?.length) continue;   // progress-объект

                    const chapterLabel = result.label || '';

                    result.subitems.forEach(item => {
                        if (aborted || count >= MAX) return;
                        count++;

                        // excerpt — объект {pre, match, post} из foliate-js search.js
                        let matchHtml = '';
                        const ex = item.excerpt;
                        if (ex && typeof ex === 'object') {
                            const pre   = ex.pre   || '';
                            const match = ex.match || query;
                            const post  = ex.post  || '';
                            matchHtml = escHtml(pre)
                                + '<mark>' + escHtml(match) + '</mark>'
                                + escHtml(post);
                        } else if (typeof ex === 'string') {
                            const esc2 = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            matchHtml = escHtml(ex).replace(
                                new RegExp('(' + esc2 + ')', 'gi'),
                                '<mark>$1</mark>');
                        } else {
                            matchHtml = escHtml(query);
                        }

                        const el = document.createElement('div');
                        el.className = 'search-result-item';
                        el.innerHTML =
                            '<div class="sr-match">' + matchHtml + '</div>' +
                            (chapterLabel
                                ? '<div class="sr-chapter">' + escHtml(chapterLabel) + '</div>'
                                : '');
                        el.addEventListener('click', async () => {
                            if (item.cfi) {
                                // Переход на позицию
                                await view.goTo(item.cfi);

                                // Обновляем подсветку
                                setTimeout(() => loadHighlights(), 300);

                                // Показываем кнопку снятия выделения
                                const clearBtn = document.getElementById('clearSearchHighlight');
                                if (clearBtn) clearBtn.style.display = 'block';
                                
                                // Добавляем обработчик для снятия выделения по клику
                                // Выделение появится автоматически от foliate-js
                                setTimeout(() => {
                                    const doc = view.renderer?.getContents?.()?.[0]?.doc;
                                    if (doc) {
                                        // Клик по документу снимает выделение поиска
                                        const clickHandler = (e) => {
                                            // Проверяем, что клик не по другому результату поиска
                                            if (e.target.closest('.search-result-item')) return;
                                            
                                            // Снимаем выделение
                                            const selection = doc.defaultView?.getSelection();
                                            if (selection) selection.removeAllRanges();
                                            
                                            // Скрываем кнопку
                                            const btn = document.getElementById('clearSearchHighlight');
                                            if (btn) btn.style.display = 'none';
                                            
                                            // Удаляем обработчик
                                            doc.removeEventListener('click', clickHandler);
                                            log('🔍 Выделение поиска снято', 'info');
                                        };
                                        
                                        // Даем небольшую задержку перед установкой обработчика
                                        setTimeout(() => {
                                            doc.addEventListener('click', clickHandler);
                                            log('🔍 Кликните в любом месте для снятия выделения', 'info');
                                        }, 500);
                                    }
                                }, 300);
                            }
                        });
                        resultsEl.appendChild(el);
                        // Показываем результаты по мере нахождения
                        if (count === 1) statusEl.textContent = 'Поиск… (найдено: 1)';
                        else if (count % 20 === 0) statusEl.textContent = `Поиск… (найдено: ${count})`;
                    });

                    if (count >= MAX) break;
                }

                clearTimeout(timeoutId);
                if (!aborted) {
                    const resultText = count
                        ? 'Найдено: ' + count + (count >= MAX ? '+' : '') + ' результатов'
                        : 'Ничего не найдено';
                    statusEl.textContent = resultText;
                    
                    // Показываем кнопку снятия выделения, если что-то найдено
                    const clearBtn = document.getElementById('clearSearchHighlight');
                    if (clearBtn) {
                        clearBtn.style.display = count > 0 ? 'block' : 'none';
                    }
                }
            } catch(e) {
                clearTimeout(timeoutId);
                if (!aborted) {
                    statusEl.textContent = 'Ничего не найдено';
                    log('Поиск: ' + e.message, 'error');
                }
            }
        }

        // Экранирование HTML для безопасного вывода
        function escHtml(s) {
            return String(s)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ==================== TTS ЯДРО ====================
        // Использует встроенный foliate-js TTS класс:
        // - view.initTTS('sentence', highlightFn) создаёт TTS с Intl.Segmenter
        // - TTS итерирует блоки (p, h1-h6, li...) через getBlocks(doc)
        // - Для каждого блока textWalker+Segmenter строит правильные cross-node Range
        // - view.tts.getRanges() возвращает Map<name,range> для текущего блока
        // - view.tts.setMark(name) вызывает highlightFn(range) и запоминает позицию

        function getOverlayer() {
            try {
                const contents = view?.renderer?.getContents();
                return contents?.[0]?.overlayer || null;
            } catch(e) { return null; }
        }

        function getTTSDoc() {
            try {
                return view?.renderer?.getContents()?.[0]?.doc || null;
            } catch(e) { return null; }
        }

        function ttsHighlight(range) {
            clearTTSHighlight();
            const ov = getOverlayer();
            if (!ov || !range) return;
            const id = 'tts-' + Date.now();
            try {
                // Определяем тёмную тему по фону документа
                const docBg = getTTSDoc()?.documentElement?.style?.backgroundColor || '';
                const isDarkTheme = docBg.includes('#1e1e1e') || docBg.includes('#121212') || 
                                    docBg.includes('rgb(30') || docBg.includes('rgb(18');
                
                // Для тёмной темы: яркость 95% (f2), для светлой: 85% (cc)
                const alpha = isDarkTheme ? 'f2' : 'cc';
                const colorWithAlpha = ttsHighlightColor + alpha;
                
                ov.add(id, range, Overlayer.highlight, { color: colorWithAlpha });
                currentTTSHighlightId = id;
                log('✨ Подсветка: ' + range.toString().substring(0, 40) + (isDarkTheme ? ' [тёмная тема]' : ''), 'tts');
                updateStats();
            } catch(e) {
                log('❌ Ошибка подсветки: ' + e.message, 'error');
            }
        }

        function clearTTSHighlight() {
            const ov = getOverlayer();
            if (currentTTSHighlightId && ov) {
                try { ov.remove(currentTTSHighlightId); } catch(e) {}
                currentTTSHighlightId = null;
                updateStats();
            }
        }

        // Инициализирует view.tts для текущего doc.
        // Всегда пересоздаёт (view.tts = null), чтобы начать с первого блока.
        async function initTTSForCurrentDoc() {
            const doc = getTTSDoc();
            if (!doc) { log('❌ doc недоступен', 'error'); return false; }
            view.tts = null; // сбрасываем, чтобы initTTS пересоздал
            try {
                await view.initTTS('sentence', ttsHighlight);
                return !!view.tts;
            } catch(e) {
                log('❌ initTTS: ' + e.message, 'error');
                return false;
            }
        }

        // «Подпись» блока — первые 6 слов всех предложений вместе (для пропуска дублей)
        function blockSignature() {
            return ttsSentences.slice(0, 3).map(s => s.text.trim()).join(' ')
                   .split(/\s+/).slice(0, 8).join(' ').toLowerCase();
        }

        // Загружает предложения из текущего блока в ttsSentences[].
        // Возвращает true если есть предложения.
        function loadSentencesFromBlock() {
            if (!view.tts) return false;
            const ranges = view.tts.getRanges();
            if (!ranges?.size) return false;
            ttsSentences = [];
            for (const [name, range] of ranges) {
                const text = range.toString().replace(/\s+/g, ' ').trim();
                if (text.length > 3) {
                    ttsSentences.push({ name, text, range });
                }
            }
            ttsSentenceIndex = 0;
            // Логирование для отладки — показываем первые 3 предложения
            if (ttsSentences.length > 0) {
                log('📝 Блок: ' + ttsSentences.length + ' предложений', 'tts');
                log('📝 Первое: ' + ttsSentences[0].text.substring(0, 100), 'tts');
            } else {
                log('⚠️ Блок пуст!', 'warn');
            }
            return ttsSentences.length > 0;
        }

        // Убеждаемся, что range виден (для paginated режима — листаем если нужно)
        async function ensureRangeVisible(range) {
            // Используем renderer.scrollToAnchor — именно так делает foliate-js TTS.
            // Он вычисляет Math.floor(rect.left / pageSize) и прыгает прямо на нужную
            // страницу, даже если она несколько страниц вперёд. view.next() делал
            // только один шаг, что ломало перелистывание в длинных главах.
            if (!range || !view?.renderer) return;
            try {
                await view.renderer.scrollToAnchor(range);
            } catch(e) {
                log('⚠️ scrollToAnchor: ' + e.message, 'warn');
            }
        }

        // ==================== TTS ====================

        /**
         * Расширяет range вправо до ближайшего знака пунктуации (. ! ? : ;)
         * или до конца текстового узла, если знак не найден.
         *
         * Проблема: пользователь выделяет "Пролог" без точки, но в DOM текст "Пролог."
         * view.tts.from(range) не находит точного совпадения → позиционируется неверно.
         */
        function extendRangeToPunctuation(range) {
            // Дотягивает range до знака завершения предложения — но только если
            // знак находится в пределах 5 символов. Это нужно для заголовков типа
            // "Пролог." где пользователь выделил "Пролог" без точки.
            // Если знак далеко — возвращаем range как есть, чтобы не перепрыгнуть
            // на следующее предложение (диалоги, короткие фразы без знаков).
            try {
                const node = range.endContainer;
                if (node.nodeType !== Node.TEXT_NODE) return range;
                const text = node.textContent;
                let pos = range.endOffset;
                // Уже захватывает знак пунктуации — ничего не делаем
                if (pos > 0 && /[.!?:;…]/.test(text[pos - 1])) return range;
                // Ищем знак пунктуации только в пределах 5 символов
                const limit = Math.min(pos + 5, text.length);
                let found = -1;
                for (let i = pos; i < limit; i++) {
                    if (/[.!?:;…]/.test(text[i])) { found = i; break; }
                }
                if (found === -1) return range;  // знак не найден рядом — не расширяем
                const ext = range.cloneRange();
                ext.setEnd(node, found + 1);
                return ext;
            } catch(e) {
                return range;
            }
        }


        // Получить первый видимый Range на экране (для старта с текущей страницы)
        function getFirstVisibleRange() {
            // Тот же подход что у speakFromHere: создаём Range из реального DOM-узла,
            // затем вызываем view.tts.from(range).
            //
            // Координатная система (из isOnNextPage):
            //   Текущая страница N: rect.left ∈ [renderer.start - renderer.size, renderer.start)
            //   Следующая страница: rect.left >= renderer.start
            //   renderer.start = N * columnWidth (абсолютные координаты контента)
            //
            // Алгоритм: собираем ВСЕ текстовые узлы на текущей странице,
            // сортируем по (rect.top, rect.left), берём самый первый.
            try {
                const contents = view?.renderer?.getContents?.();
                if (!contents?.length) return null;
                const doc = contents[0].doc;
                if (!doc?.body) return null;

                const pageEnd   = view?.renderer?.start ?? 0;   // правый край текущей страницы (= renderer.start)
                const pageWidth = view?.renderer?.size  ?? 0;   // ширина одной колонки

                const candidates = [];
                const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
                let node;
                while ((node = walker.nextNode())) {
                    const text = node.textContent.trim();
                    if (!text) continue;
                    const range = doc.createRange();
                    range.setStart(node, 0);
                    range.setEnd(node, Math.min(1, node.length));
                    const rect = range.getBoundingClientRect();
                    if (!rect || rect.width === 0 || rect.height === 0) continue;
                    if (rect.top < 0) continue;

                    let onCurrentPage;
                    if (pageWidth > 0) {
                        onCurrentPage = rect.left < (pageEnd || pageWidth) &&
                                        rect.left >= Math.max(0, (pageEnd || pageWidth) - pageWidth);
                    } else {
                        onCurrentPage = rect.top < window.innerHeight;
                    }

                    if (onCurrentPage) {
                        candidates.push({ node, top: rect.top, left: rect.left });
                    }
                }

                if (!candidates.length) return null;

                candidates.sort((a, b) => a.top !== b.top ? a.top - b.top : a.left - b.left);

                // Берём первый кандидат
                let best = candidates[0];
                
                // ПРОВЕРКА: если текст начинается со строчной буквы - это продолжение
                // предыдущего предложения, ищем следующее с заглавной
                const bestText = best.node.textContent.trim();
                if (bestText.length > 0 && /^[а-яa-z]/.test(bestText)) {
                    log(`ℹ️ Текст начинается с маленькой: "${bestText.substring(0,30)}...", ищем дальше`, 'tts');
                    const nextBest = candidates.find(c => {
                        const text = c.node.textContent.trim();
                        return text.length > 0 && /^[А-ЯA-Z]/.test(text);
                    });
                    if (nextBest) {
                        best = nextBest;
                        log(`✅ Нашли с заглавной: top=${best.top}`, 'tts');
                    }
                }
                
                const range = doc.createRange();
                range.setStart(best.node, 0);
                range.setEnd(best.node, best.node.length);
                log(`📍 getFirstVisibleRange: top=${Math.round(best.top)} left=${Math.round(best.left)} pageEnd=${pageEnd} pageWidth=${pageWidth} text="${best.node.textContent.trim().substring(0,40)}"`, 'tts');
                return range;
            } catch(e) {
                log('⚠️ getFirstVisibleRange: ' + e.message, 'warn');
            }
            return null;
        }

        // Получает range с первого реально видимого символа текста на текущей странице разворота
        // Использует binary search по символам текстового узла для точного определения позиции
        function getPreciseVisibleStartRange(renderer) {
            try {
                // Получаем документ текущей секции из renderer
                const contents = renderer?.getContents?.();
                if (!contents?.length) {
                    log('⚠️ getPreciseVisibleStartRange: нет содержимого renderer', 'warn');
                    return null;
                }

                const doc = contents[0].doc;
                if (!doc?.body) {
                    log('⚠️ getPreciseVisibleStartRange: нет doc.body', 'warn');
                    return null;
                }

                // Получаем параметры видимой области от renderer
                const pageEnd = renderer.start ?? 0;       // правый край текущей страницы
                const pageWidth = renderer.size ?? 0;      // ширина одной страницы
                const viewportHeight = window.innerHeight; // высота viewport

                // Вычисляем границы текущей страницы для spread-режима
                const pageLeft = pageWidth > 0 ? Math.max(0, pageEnd - pageWidth) : 0;
                const pageRight = pageEnd || pageWidth;

                // Создаём TreeWalker только по текстовым узлам тела документа
                const walker = doc.createTreeWalker(
                    doc.body,
                    NodeFilter.SHOW_TEXT,
                    {
                        acceptNode: (node) => {
                            // Пропускаем пустые узлы
                            const text = node.textContent;
                            if (!text || text.trim().length === 0) return NodeFilter.FILTER_REJECT;

                            // Пропускаем узлы в script, style, noscript, overlay, footnotes
                            let parent = node.parentElement;
                            while (parent) {
                                const tagName = parent.tagName.toLowerCase();
                                if (tagName === 'script' || tagName === 'style' || tagName === 'noscript') {
                                    return NodeFilter.FILTER_REJECT;
                                }
                                // Пропускаем overlay и footnotes от foliate
                                if (parent.classList?.contains('foliate-overlay') ||
                                    parent.classList?.contains('foliate-footnote') ||
                                    parent.classList?.contains('footnote') ||
                                    parent.classList?.contains('overlay')) {
                                    return NodeFilter.FILTER_REJECT;
                                }
                                parent = parent.parentElement;
                            }

                            return NodeFilter.FILTER_ACCEPT;
                        }
                    }
                );

                // Собираем кандидаты: первый видимый символ каждого узла
                const symbolCandidates = [];

                for (let node = walker.nextNode(); node; node = walker.nextNode()) {
                    const text = node.textContent;
                    if (!text || text.length === 0) continue;

                    // Проверяем, есть ли у узла видимые rect на текущей странице
                    const parentRects = node.parentElement?.getClientRects?.();
                    if (!parentRects || parentRects.length === 0) continue;

                    // Проходим по всем rect узла и ищем первый видимый на текущей странице
                    let firstVisibleSymbolIndex = -1;
                    let firstVisibleRect = null;

                    // Binary search: находим первый видимый символ в узле
                    const result = findFirstVisibleSymbol(doc, node, text, pageLeft, pageRight, viewportHeight);
                    if (result) {
                        firstVisibleSymbolIndex = result.index;
                        firstVisibleRect = result.rect;
                    }

                    if (firstVisibleSymbolIndex >= 0 && firstVisibleRect) {
                        symbolCandidates.push({
                            node,
                            index: firstVisibleSymbolIndex,
                            top: firstVisibleRect.top,
                            left: firstVisibleRect.left,
                            text: text.substring(firstVisibleSymbolIndex, Math.min(firstVisibleSymbolIndex + 50, text.length))
                        });
                    }
                }

                if (!symbolCandidates.length) {
                    log('⚠️ getPreciseVisibleStartRange: нет видимых символов на странице', 'warn');
                    return null;
                }

                // Сортируем по (top, left) — сначала верхние, потом левые
                symbolCandidates.sort((a, b) => {
                    const topDiff = a.top - b.top;
                    if (Math.abs(topDiff) > 3) return topDiff; // разница по вертикали > 3px
                    return a.left - b.left; // разница по горизонтали
                });

                // Берём первый (самый верхний-левый) видимый символ
                const best = symbolCandidates[0];
                const range = doc.createRange();
                range.setStart(best.node, best.index);
                range.setEnd(best.node, Math.min(best.index + 10, best.node.length));

                log(`📍 getPreciseVisibleStartRange: символ #${best.index} top=${Math.round(best.top)} left=${Math.round(best.left)} "${best.text}..."`, 'tts');
                return range;

            } catch (e) {
                log('⚠️ getPreciseVisibleStartRange: ' + e.message, 'warn');
                return null;
            }
        }

        // Binary search: находит первый видимый символ в текстовом узле
        // Возвращает { index, rect } или null
        function findFirstVisibleSymbol(doc, node, text, pageLeft, pageRight, viewportHeight) {
            const textLength = text.length;
            if (textLength === 0) return null;

            // Проверяем весь узел целиком - если ни один rect не виден, пропускаем узел
            const fullRange = doc.createRange();
            fullRange.selectNodeContents(node);
            const allRects = fullRange.getClientRects();
            if (!allRects || allRects.length === 0) return null;

            // Проверяем, есть ли вообще видимые rect на текущей странице
            let hasVisible = false;
            for (let i = 0; i < allRects.length; i++) {
                const rect = allRects[i];
                if (rect.width === 0 || rect.height === 0) continue;
                if (rect.left >= pageLeft - 10 && rect.left < pageRight &&
                    rect.top >= 0 && rect.bottom <= viewportHeight) {
                    hasVisible = true;
                    break;
                }
            }
            if (!hasVisible) return null;

            // Binary search по символам
            let low = 0;
            let high = textLength - 1;
            let foundIndex = -1;
            let foundRect = null;

            while (low <= high) {
                const mid = Math.floor((low + high) / 2);

                // Создаём range для одного символа
                const range = doc.createRange();
                range.setStart(node, mid);
                range.setEnd(node, Math.min(mid + 1, textLength));

                const rects = range.getClientRects();
                if (!rects || rects.length === 0) {
                    low = mid + 1;
                    continue;
                }

                const rect = rects[0];
                if (rect.width === 0 || rect.height === 0) {
                    low = mid + 1;
                    continue;
                }

                // Проверяем, виден ли символ на текущей странице
                const isVisible = (
                    rect.left >= pageLeft - 10 &&
                    rect.left < pageRight &&
                    rect.top >= 0 &&
                    rect.bottom <= viewportHeight
                );

                if (isVisible) {
                    foundIndex = mid;
                    foundRect = rect;
                    // Пробуем найти ещё раньше (левее/выше)
                    high = mid - 1;
                } else {
                    // Символ не виден - проверяем, где он находится
                    // Если rect выше или левее видимой области - идём вперёд
                    if (rect.top < 0 || (rect.left < pageLeft - 10 && rect.top < viewportHeight)) {
                        low = mid + 1;
                    }
                    // Если rect ниже или правее видимой области - идём назад
                    else if (rect.bottom > viewportHeight || rect.left >= pageRight) {
                        high = mid - 1;
                    }
                    else {
                        low = mid + 1;
                    }
                }
            }

            if (foundIndex >= 0 && foundRect) {
                return { index: foundIndex, rect: foundRect };
            }

            return null;
        }

        // Функция коррекции визуального позиционирования для spread-режима
        // Гарантирует, что при старте TTS пользователь видит левую страницу разворота
        // Если текущая страница правая (нечётный индекс), переходим на левую (чётный индекс)
        async function ensureVisualLeftStart() {
            try {
                const renderer = view?.renderer;
                if (!renderer) return false;
                
                // Получаем текущий индекс страницы (0-based)
                const currentPage = renderer.page;
                if (currentPage === undefined || currentPage === null) return false;
                
                // Получаем общее количество страниц
                const pages = renderer.pages;
                if (!pages || pages < 2) return false; // Не spread-режим
                
                // page=0 — первая страница (левая), page=1 — вторая (правая) и т.д.
                // Если текущая страница нечётная (правая на развороте),
                // переходим на предыдущую (левую)
                if (currentPage % 2 === 1) {
                    log(`📐 ensureVisualLeftStart: страница ${currentPage} (правая), переходим на предыдущую`, 'tts');
                    await renderer.prev();
                    // Даём время на завершение анимации и перерисовку
                    await new Promise(resolve => setTimeout(resolve, 150));
                    log(`✅ ensureVisualLeftStart: переход завершён`, 'tts');
                    return true;
                }
                
                log(`✓ ensureVisualLeftStart: страница ${currentPage} уже левая`, 'tts');
                return false;
            } catch (e) {
                log('⚠️ ensureVisualLeftStart: ' + e.message, 'warn');
                return false;
            }
        }

        async function startTTS() {
            if (!currentVoice) {
                log('⚠️ Сначала выберите голос', 'warn');
                return;
            }
            if (!bookReady) {
                log('⏳ Книга ещё не готова, TTS отложен', 'tts');
                pendingTTSStart = true;
                return;
            }
            if (currentEngine === 'Piper') {
                const voice = VOICES['Piper']?.find(v => v.id === currentVoice);
                if (!voice?.available) {
                    log('⚠️ Голос Piper не установлен', 'warn');
                    return;
                }
            }

            // ── Продолжение с паузы ──
            if (ttsPaused && ttsSentences.length > 0 && ttsSentenceIndex < ttsSentences.length) {
                log('▶️ Продолжаем с паузы (предл. ' + (ttsSentenceIndex+1) + '/' + ttsSentences.length + ')', 'tts');
                resumeTTS();
                return;
            }

            // ── Новый старт ──
            ttsPaused = false;
            ttsActive = true;
            ttsPageTurning = false;
            ttsGlobalRepeatCount = 0;
            ttsLastGlobalText = '';
            ttsLastBlockSignature = '';
            updateTTSButtons();
            document.getElementById('ttsControls').classList.add('visible');

            try {
                if (!await initTTSForCurrentDoc()) {
                    log('❌ initTTSForCurrentDoc вернул false', 'error');
                    ttsActive = false;
                    updateTTSButtons();
                    return;
                }

                // Пробуем стартовать с текущей видимой страницы.
                // ensureVisualLeftStart() убран — он вызывал renderer.prev() что
                // перебрасывало пользователя на предыдущую секцию/главу когда
                // текущая страница оказывалась нечётной (правой на развороте).

                // Сначала пробуем точный binary-search range
                const renderer = view?.renderer;
                let visibleRange = getPreciseVisibleStartRange(renderer);
                // Если не нашли — берём первый видимый узел
                if (!visibleRange) {
                    visibleRange = getFirstVisibleRange();
                }

                let ssml = null;

                if (visibleRange) {
                    // Определяем: находимся ли мы на первой странице секции?
                    // renderer.page === 0 означает первую страницу текущей секции
                    // (в spread-режиме — тоже 0 для левой первой страницы).
                    // В этом случае используем tts.start() вместо tts.from() потому что:
                    //   tts.from() может попасть в скрытый блок <title>/<h1> в начале секции,
                    //   чьи DOM-ranges лежат вне видимой области → setMark() не находит текст.
                    //   tts.start() всегда начинает с первого видимого блока и подсветка работает.
                    const isFirstPageOfSection = (view?.renderer?.page ?? -1) === 0;
                    if (!isFirstPageOfSection) {
                        log('📍 Старт с текущей страницы (не первая) → tts.from()', 'tts');
                        try {
                            const rangeForTTS = extendRangeToPunctuation(visibleRange);
                            ssml = view.tts.from(rangeForTTS);
                            if (!ssml) ssml = view.tts.from(visibleRange);
                        } catch(e) {
                            log('⚠️ tts.from() ошибка: ' + e.message, 'warn');
                        }
                    } else {
                        log('📖 Первая страница секции → tts.start() (надёжная подсветка)', 'tts');
                        // ssml остаётся null → упадёт в блок tts.start() ниже
                    }
                }

                if (!ssml) {
                    log('📖 Старт с начала секции (tts.start)', 'tts');
                    ssml = view.tts.start();
                }

                log('📡 TTS start SSML length: ' + (ssml?.length ?? 'null'), 'tts');

                if (!ssml) {
                    log('⚠️ Нет содержимого для TTS', 'warn');
                    ttsActive = false;
                    updateTTSButtons();
                    return;
                }

                if (loadSentencesFromBlock() && ttsSentences.length > 0) {
                    log('✅ Первый блок: ' + ttsSentences.length + ' предл.', 'tts');
                    // Показываем первое предложение — это может быть заголовок
                    log('📝 Первое предложение: ' + ttsSentences[0].text.substring(0, 150), 'tts');
                    ttsLastBlockSignature = blockSignature();
                    await speakCurrentSentence();
                } else {
                    log('⚠️ Первый блок пуст, ищем следующий...', 'tts');
                    await advanceToNextSentence();
                }
            } catch(e) {
                log('❌ startTTS: ' + e.message, 'error');
                ttsActive = false;
                updateTTSButtons();
            }
        }

        // Пауза — сохраняет подсветку и позицию, можно продолжить
        function pauseTTS() {
            ttsActive = false;
            ttsPaused = true;
            // Скрываем кнопку "Показать панель" на паузе
            updateTTSButtons();
            if (bridge) bridge.pauseTTS();
            // НЕ очищаем подсветку — показываем где остановились
            log('⏸️ Пауза — подсветка сохранена', 'tts');
        }

        // Продолжение с паузы — повторяет текущую фразу
        function resumeTTS() {
            if (!ttsPaused) return;
            
            // Проверяем, есть ли сохранённые предложения
            if (ttsSentences.length > 0 && ttsSentenceIndex < ttsSentences.length) {
                log('▶️ Повторяем предл. ' + (ttsSentenceIndex+1) + '/' + ttsSentences.length, 'tts');
                ttsPaused = false;
                ttsActive = true;
                ttsPageTurning = false;
                updateTTSButtons();
                document.getElementById('ttsControls').classList.add('visible');
                // Повторяем текущую фразу (не переходим к следующей!)
                speakCurrentSentence();
            } else {
                // Если предложений нет, начинаем заново
                log('▶️ Начинаем заново', 'tts');
                startTTS();
            }
        }

        // Полная остановка — сбрасывает всё состояние
        function stopTTSFull() {
            ttsActive = false;
            ttsPaused = false;
            ttsSentences = [];
            ttsSentenceIndex = 0;
            ttsPageTurning = false;
            if (bridge) bridge.stopTTS();
            clearTTSHighlight();
            // Скрываем кнопки TTS из bottomNav и панель настроек
            document.getElementById('ttsControls').classList.remove('visible');
            document.getElementById('ttsSettingsPanel').classList.remove('visible');
            updateTTSButtons();
            flushSavePosition();
            log('⏹️ TTS остановлен', 'tts');
        }

        // Кнопка закрыть:
        // - Если TTS играет → сворачивает панель (но TTS продолжает), кнопка появится в настройках
        // - Если TTS на паузе/стоп → полная остановка и скрытие
        function closeTTSPanel() {
            // Кнопки TTS встроены в bottomNav — "сворачивать" нечего.
            // Крестик всегда означает полную остановку TTS.
            stopTTSFull();
        }

        // Озвучивает текущее предложение (ttsSentences[ttsSentenceIndex])
        async function speakCurrentSentence() {
            if (!ttsActive || !ttsSentences.length) return;
            const s = ttsSentences[ttsSentenceIndex];

            // Пропускаем "* * *" — не озвучиваем, сразу переходим к следующему предложению
            if (s.text.trim() === '* * *') {
                log('⏭ Пропуск "* * *"', 'tts');
                // Если это первое предложение в блоке (ttsSentenceIndex === 0),
                // то НЕ увеличиваем индекс - пусть advanceToNextSentence() сам перейдёт к следующему блоку
                if (ttsSentenceIndex === 0) {
                    log('ℹ️ "* * *" - первое в блоке, переходим к следующему блоку', 'tts');
                    await advanceToNextSentence();
                    return;
                }
                // Если не первое - просто пропускаем
                ttsSentenceIndex++;
                if (ttsSentenceIndex < ttsSentences.length) {
                    await speakCurrentSentence();
                } else {
                    await advanceToNextSentence();
                }
                return;
            }
            
            // Запоминаем текст — используется для пропуска дублей заголовков при смене секции
            ttsLastGlobalText = s.text;

            try {
                // setMark вызывает ttsHighlight(range) через callback, который рисует подсветку
                view.tts.setMark(s.name);
            } catch(e) {
                log('⚠️ setMark ошибка: ' + e.message, 'warn');
                // Fallback: подсвечиваем напрямую
                try { ttsHighlight(s.range.cloneRange()); } catch(e2) {}
            }
            // Убеждаемся, что подсвеченный текст виден
            try { await ensureRangeVisible(s.range); } catch(e) {}
            log('🔊 [' + (ttsSentenceIndex+1) + '/' + ttsSentences.length + '] ' + s.text.substring(0, 60), 'tts');
            if (bridge) {
                log('📡 Вызываем bridge.onTTSText()', 'tts');
                log('📡 Текст: ' + s.text.substring(0, 200), 'tts');
                bridge.onTTSText(s.text);
            } else {
                log('❌ bridge не определён!', 'error');
            }
        }

        // ── Переходит к следующему предложению: по страницам через CFI ──
        //
        // Вместо "следующий блок" — проверяем есть ли следующее предложение
        // на текущей странице. Если нет — листаем страницу через renderer.next().
        // view.next() вызывается только для смены секции (goToNextSection).
        // Все range остаются валидными при листании страниц внутри секции
        // (iframe не перегружается, только scroll-позиция меняется).
        //
        // CFI сохраняется через view.lastLocation.cfi при паузе.

        // Правый край текущей видимой страницы (для paginated-режима)
        // Проверяет: range ушёл на следующий разворот?
        //
        // Ключевое: getBoundingClientRect() → VIEWPORT-координаты.
        //           renderer.start          → scrollLeft (АБСОЛЮТНАЯ). Нельзя сравнивать!
        //
        // Правильная viewport-логика:
        //   Текущий разворот: rect.left ∈ [0, renderer.size)  — всегда
        //   Следующий разворот: rect.left ≥ renderer.size
        //
        // renderer.size = viewport-ширина разворота (постоянна для всех N).
        //
        function isOnNextPage(range) {
            try {
                const rect = range.getBoundingClientRect();
                if (!rect || rect.width === 0) return false;
                const pageStart = view.renderer.start;  // = N * columnWidth для текущей страницы N
                if (!pageStart) return false;            // страница 0 / scrolled режим
                return rect.left >= pageStart - 5;
            } catch(e) { return false; }
        }

        // Листает страницу и продолжает TTS с текущего предложения
        async function turnPageTTS() {
            if (!ttsActive) return;
            ttsPageTurning = true;
            log('📖 Листаем страницу...', 'tts');

            await new Promise(resolve => {
                view.renderer.addEventListener('relocate', () => resolve(), { once: true });
                setTimeout(resolve, 1500);
                view.renderer.next();
            });

            await new Promise(r => setTimeout(r, 80));
            ttsPageTurning = false;
            if (!ttsActive) return;
            await speakCurrentSentence();
        }

        async function advanceToNextSentence() {
            if (!ttsActive || ttsPageTurning) return;

            // Проверка на предисловие распространителя
            const actualSection = view?.lastLocation?.section?.current ?? currentSection;
            // Уникальные фразы распространителей
            const distributorPhrases = [
                'цокольный этаж', 'сайт заблокирован', 'censor tracker',
                'антизапретом', 'телеграм-бот', 'telegram-бот',
                'наградите автора лайком', 'понравилась книга',
            ];
            const currentText = ttsSentences.map(s => s.text.toLowerCase()).join(' ');
            const isDistributorSection = distributorPhrases.some(phrase => currentText.includes(phrase));

            // Если предисловие — останавливаем TTS
            if (isDistributorSection && actualSection < 5) {
                log(`📖 ОБНАРУЖЕНО ПРЕДИСЛОВИЕ РАСПРОСТРАНИТЕЛЯ в секции ${actualSection}, останавливаем TTS`, 'tts');
                stopTTSFull(false);
                return;
            }

            // "* * *" пропускаются в speakCurrentSentence до озвучки — здесь ничего не нужно

            ttsSentenceIndex++;

            if (ttsSentenceIndex < ttsSentences.length) {
                const next = ttsSentences[ttsSentenceIndex];
                if (isOnNextPage(next.range)) {
                    log('📄 Следующее предл. на новой странице → листаем', 'tts');
                    await turnPageTTS();
                } else {
                    await speakCurrentSentence();
                }
                return;
            }

            // Конец блока — берём следующий блок секции
            const ssml = view.tts.next(false);
            if (!ssml) {
                await goToNextSection();
                return;
            }

            if (loadSentencesFromBlock() && ttsSentences.length > 0) {
                // Пропускаем блок если его подпись совпадает с предыдущим (дубль заголовка в FB2)
                const sig = blockSignature();
                if (sig && sig === ttsLastBlockSignature) {
                    log(`⏭ Дубль блока пропущен: "${ttsSentences[0].text.substring(0, 40)}"`, 'tts');
                    // Сбрасываем signature и переходим к СЛЕДУЮЩЕМУ блоку (не инкремент внутри дубля!)
                    ttsLastBlockSignature = '';
                    const skipSsml = view.tts.next(false);
                    if (!skipSsml) {
                        await goToNextSection();
                    } else if (loadSentencesFromBlock() && ttsSentences.length > 0) {
                        ttsLastBlockSignature = blockSignature();
                        await speakCurrentSentence();
                    } else {
                        await advanceToNextSentence();
                    }
                    return;
                }
                
                // 🔧 НОВАЯ ПРОВЕРКА: Пропускаем первый блок секции 0 если он уже читался
                // Это предотвращает дублирование заголовка книги в FB2
                if (actualSection === 0 && ttsLastGlobalText) {
                    // Проверяем ВСЕ предложения блока на дублирование
                    const blockText = ttsSentences.map(s => s.text.trim()).join(' ');
                    if (blockText.includes(ttsLastGlobalText)) {
                        log(`⏭ Дубль заголовка книги пропущен: "${blockText.substring(0, 60)}"`, 'tts');
                        const skipSsml = view.tts.next(false);
                        if (!skipSsml) {
                            await goToNextSection();
                        } else if (loadSentencesFromBlock() && ttsSentences.length > 0) {
                            ttsLastBlockSignature = blockSignature();
                            await speakCurrentSentence();
                        } else {
                            await advanceToNextSentence();
                        }
                        return;
                    }
                }
                
                ttsLastBlockSignature = sig;
                const next = ttsSentences[0];
                if (isOnNextPage(next.range)) {
                    log('📄 Новый блок на следующей странице → листаем', 'tts');
                    await turnPageTTS();
                } else {
                    await speakCurrentSentence();
                }
            } else {
                await advanceToNextSentence();
            }
        }

        // Переходим к следующей секции книги
        async function goToNextSection() {
            log('📄 Конец секции, переход...', 'tts');

            const sectionBefore = currentSection;
            // Используем section.total из lastLocation (надёжнее чем book.sections.length)
            const totalSections = view?.lastLocation?.section?.total
                                  ?? book?.sections?.length
                                  ?? 0;

            // Если уже на последней секции — конец книги
            if (totalSections > 0 && sectionBefore >= totalSections - 1) {
                log(`📕 Конец книги (секция ${sectionBefore}/${totalSections - 1})`, 'tts');
                stopTTSFull(true);
                return;
            }

            clearTTSHighlight();
            ttsPageTurning = true;

            // Ждём create-overlay — сигнал что новая секция загружена и iframe готов
            await new Promise(resolve => {
                let resolved = false;
                const done = () => { if (!resolved) { resolved = true; resolve(); } };
                view.addEventListener('create-overlay', done, { once: true });
                setTimeout(done, 3000);
                view.next();
            });

            await new Promise(r => setTimeout(r, 300));
            
            // Обновляем currentSection из renderer.getContents() — самый надёжный способ
            try {
                const contents = view.renderer?.getContents?.();
                if (contents?.length > 0 && contents[0].index !== undefined) {
                    currentSection = contents[0].index;
                    log(`📖 goToNextSection: currentSection обновлён → ${currentSection}`, 'tts');
                }
            } catch(e) {}
            ttsPageTurning = false;

            if (!ttsActive) return;

            // Проверяем: секция действительно сменилась?
            if (currentSection === sectionBefore) {
                // view.next() не сработал — проверяем, это действительно конец книги или просто конец текста в секции
                // Если мы на последней секции И в ней нет больше текста — это конец книги
                if (totalSections > 0 && sectionBefore >= totalSections - 1) {  // всё ещё конец
                    // Мы уже исчерпали все блоки последней секции (view.tts.next() вернул null
                    // ещё в advanceToNextSentence), а view.next() не смог продвинуться дальше.
                    // Вызывать view.tts.start() здесь нельзя — он сбросит позицию в начало
                    // последней секции и TTS зациклится, перечитывая её заново.
                    log('📕 Конец книги (последняя секция, все блоки исчерпаны)', 'tts');
                    stopTTSFull(true);
                    return;
                }
                // view.next() не смог продвинуть нас вперёд, секция не изменилась.
                // Мы попали сюда потому что view.tts.next() уже вернул null в advanceToNextSentence —
                // все блоки текущей секции исчерпаны. Вызывать tts.start() нельзя: он сбросит
                // позицию в начало секции и TTS зациклится. currentSection мог отстать от реального
                // (напр. показывает N-1 вместо N) — поэтому не полагаемся на сравнение с totalSections.
                log('📕 Конец книги (view.next() не сработал, блоки секции исчерпаны)', 'tts');
                stopTTSFull(true);
                return;
            }

            // Секция сменилась — пересоздаём TTS для нового doc
            if (!await initTTSForCurrentDoc()) {
                log('❌ Не удалось инициализировать TTS в новой секции', 'error');
                ttsActive = false;
                updateTTSButtons();
                return;
            }

            const ssml = view.tts.start();
            if (!ssml) {
                // Нет текста в новой секции — пробуем перейти к следующей
                log('📄 Нет текста в секции, переходим дальше...', 'tts');
                ttsPageTurning = true;
                await goToNextSection();
                return;
            }

            if (loadSentencesFromBlock() && ttsSentences.length > 0) {
                // Пропускаем первый блок новой секции если он дублирует последний блок предыдущей
                const newSig = blockSignature();
                if (newSig && newSig === ttsLastBlockSignature) {
                    log(`⏭ Дубль заголовка при смене секции пропущен: "${ttsSentences[0].text.substring(0, 40)}"`, 'tts');
                    ttsLastBlockSignature = '';
                    const skipSsml = view.tts.next(false);
                    if (!skipSsml) {
                        await goToNextSection();
                    } else if (loadSentencesFromBlock() && ttsSentences.length > 0) {
                        ttsLastBlockSignature = blockSignature();
                        await speakCurrentSentence();
                    } else {
                        await advanceToNextSentence();
                    }
                    return;
                }
                ttsLastBlockSignature = newSig;
                await speakCurrentSentence();
            } else {
                await advanceToNextSentence();
            }
        }

        // БАГ-ФИКС: защита от повторного входа (re-entrancy guard).
        // Если Python-callback пришёл дважды (баг двойного вызова callback),

        // второй вызов ttsNext будет отброшен пока первый ещё выполняется.
        let _ttsNextRunning = false;

        window.ttsNext = async function() {
            if (!ttsActive || ttsPageTurning) {
                log('⚠️ ttsNext: ttsActive=' + ttsActive + ' ttsPageTurning=' + ttsPageTurning, 'tts');
                return;
            }
            if (_ttsNextRunning) {
                log('⚠️ ttsNext: уже выполняется, повторный вызов отброшен (двойной callback)', 'warn');
                return;
            }
            _ttsNextRunning = true;
            log('📡 ttsNext вызван из Python', 'tts');
            try {
                await advanceToNextSentence();
            } finally {
                _ttsNextRunning = false;
            }
        };
        // Экспортируем в window для setTimeout/runJavaScript контекстов
        window.startTTS    = () => startTTS();
        window.pauseTTS    = () => pauseTTS();
        window.resumeTTS   = () => resumeTTS();
        window.toggleTTS   = () => {
            if (ttsActive)       pauseTTS();
            else if (ttsPaused)  resumeTTS();
            else                 startTTS();
        };
        window.stopTTSFull  = () => stopTTSFull();
        window.closeTTSPanel = () => closeTTSPanel();
        window.loadBook = (data) => loadBook(data);

        // ── ЗАКЛАДКИ ──

        let bookmarks = []; // кэш закладок текущей книги

        function loadBookmarks() {
            if (!bridge) return;
            bridge.getBookmarks(json => {
                try {
                    bookmarks = JSON.parse(json) || [];
                    // Миграция: CFI и fraction сохраняем
                    let migrated = false;
                    bookmarks.forEach(bm => {
                        if (bm.position?.cfi) {
                            // CFI уже есть, ничего не делаем
                        } else if (bm.position?.fraction) {
                            // Конвертируем fraction в position (для старых закладок)
                            bm.position.cfi = null;  // Будет получен при следующем переходе
                        }
                        if (bm.position?.text) {
                            delete bm.position.text;  // Удаляем text
                        }
                    });
                    if (migrated) {
                        log('🔄 Миграция закладок: text удалён, fraction сохранён', 'info');
                    }
                    renderBookmarks();
                    updateBookmarkButton();
                } catch(e) {}
            });
        }

        // ── ПОДСВЕТКИ ──

        /**
         * Загрузить и применить все сохранённые подсветки для текущей книги
         */
        function loadHighlights() {
            if (!bridge || !view) return;
            
            bridge.getHighlights(function(result) {
                try {
                    const highlights = JSON.parse(result) || [];
                    if (!highlights.length) {
                        log(`ℹ️ Нет сохранённых подсветок`, 'highlight');
                        return;
                    }
                    
                    // Сохраняем подсветки в глобальной переменной для применения при навигации
                    window.savedHighlights = highlights;
                    log(`🎨 Загружено ${highlights.length} подсветок`, 'highlight');
                    
                    // Применяем подсветки для текущей секции
                    applyHighlightsForCurrentSection();
                    
                } catch (e) {
                    log(`❌ Ошибка загрузки подсветок: ${e.message}`, 'error');
                }
            });
        }

        /**
         * Применить подсветки для текущей секции
         */
        function applyHighlightsForCurrentSection() {
            if (!window.savedHighlights || !view) return;

            const ov = getOverlayer();
            if (!ov) {
                log('❌ Overlayer недоступен', 'error');
                return;
            }

            // Сначала удаляем все пользовательские подсветки из overlayer
            window.savedHighlights.forEach(h => {
                try { ov.remove(h.id); } catch(e) {}
            });

            let applied = 0;
            for (const h of window.savedHighlights) {
                try {
                    const highlightData = JSON.parse(h.cfi || '{}');
                    const section = highlightData.section;
                    
                    // Проверяем ч��о подсветка в текущей секции
                    if (section === currentSection) {
                        const text = h.text;
                        
                        if (text && view.renderer) {
                            const doc = view.renderer.getContents()[0]?.doc;
                            if (doc) {
                                // Ищем текст в документе
                                const range = findTextRange(doc, text);
                                if (range) {
                                    const hexColor = HIGHLIGHT_COLORS[h.color] || '#aecbfa';
                                    const overlayerId = h.id || ('user-' + Date.now());

                                    const style = h.style || 'highlight';
                                    const styleMethod = {
                                        'highlight': Overlayer.highlight,
                                        'underline': Overlayer.underline,
                                        'squiggly': Overlayer.squiggly,
                                    }[style] || Overlayer.highlight;

                                    ov.add(overlayerId, range, styleMethod, { color: hexColor + 'b8' });
                                    userHighlightMap[h.id] = overlayerId;
                                    applied++;
                                    log(`✅ Подсветка применена: "${text.substring(0, 30)}..."`, 'highlight');
                                } else {
                                    log(`⚠️ Текст не найден в секции ${section}`, 'warn');
                                }
                            }
                        }
                    }
                } catch (e) {
                    log(`⚠️ Не удалось применить ����одсветку: ${e.message}`, 'warn');
                }
            }

            if (applied > 0) {
                log(`✅ Применено ${applied} подсветок в текущей секции`, 'highlight');
            }
        }

        /**
         * Найти Range с указанным текстом в документе
         */
        function findTextRange(doc, searchText) {
            if (!doc || !searchText) return null;
            
            const walker = doc.createTreeWalker(
                doc.body || doc.documentElement,
                NodeFilter.SHOW_TEXT,
                null
            );
            
            let node;
            while ((node = walker.nextNode())) {
                const text = node.textContent;
                if (text && text.includes(searchText)) {
                    const startIdx = text.indexOf(searchText);
                    const range = doc.createRange();
                    range.setStart(node, startIdx);
                    range.setEnd(node, startIdx + searchText.length);
                    return range;
                }
            }
            return null;
        }

        // Поиск текста в документе
        function findTextInDoc(doc, searchText) {
            // Нормализуем текст (убираем лишние пробелы)
            const normalizedSearch = searchText.trim().replace(/\s+/g, ' ');
            
            // Ищем по текстовым узлам
            const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
            let node;
            let buffer = '';
            let startNode = null;
            
            while ((node = walker.nextNode())) {
                const text = node.textContent;
                buffer += text;
                
                if (!startNode) startNode = node;
                
                // Проверяем, есть ли искомый текст в буфере
                const index = buffer.indexOf(normalizedSearch);
                if (index !== -1) {
                    // Нашли! Возвращаем Range
                    const range = doc.createRange();
                    
                    // Нужно найти начальный и конечный узлы
                    let charCount = 0;
                    let foundStart = false;
                    let foundEnd = false;
                    
                    const walker2 = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
                    let n;
                    
                    while ((n = walker2.nextNode())) {
                        const nodeLen = n.textContent.length;
                        
                        if (!foundStart && charCount + nodeLen >= index) {
                            range.setStart(n, index - charCount);
                            foundStart = true;
                        }
                        
                        if (foundStart && !foundEnd && charCount + nodeLen >= index + normalizedSearch.length) {
                            range.setEnd(n, index + normalizedSearch.length - charCount);
                            foundEnd = true;
                            break;
                        }
                        
                        charCount += nodeLen;
                    }
                    
                    if (foundStart && foundEnd) {
                        return range;
                    }
                }
                
                // Ограничиваем размер буфера
                if (buffer.length > normalizedSearch.length + 100) {
                    buffer = buffer.slice(-100);
                    startNode = null;
                }
            }
            
            return null;
        }

        // Подсветка найденного текста
        function highlightFoundText(range, doc) {
            // Прокручиваем к тексту
            const rect = range.getBoundingClientRect();
            if (rect) {
                const win = doc.defaultView;
                win?.scrollTo({
                    top: rect.top + win.scrollY - 100,
                    behavior: 'smooth'
                });
            }
            
            // Временная подсветка (желтым на 2 секунды)
            const selection = win.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            
            setTimeout(() => {
                selection.removeAllRanges();
            }, 2000);
        }

        // ==================== ПОЛЬЗОВАТЕЛЬСКАЯ ПОДСВЕТКА ====================
        
        /**
         * Проверить, есть ли подсветк���� для текущего выделенного текста.
         * Возвращает результат через callback из-за асинхронности WebChannel.
         * @param {function(object|null)} callback - функция обратного вызова с результатом {id, highlight} или null
         */
        function findHighlightForCurrentSelection(callback) {
            if (!currentSelection || !bridge || !currentBookPath) {
                callback(null);
                return;
            }

            try {
                bridge.getHighlights(function(result) {
                    try {
                        const highlights = JSON.parse(result) || [];
                        const searchText = currentSelection.trim().replace(/\s+/g, ' ');

                        if (!searchText) {
                            callback(null);
                            return;
                        }

                        // Нормализуем тексты подсветок (убираем лишние пробелы)
                        for (const h of highlights) {
                            const highlightText = (h.text || '').trim().replace(/\s+/g, ' ');
                            
                            // Точное совпадение
                            if (highlightText === searchText) {
                                log(`✅ Найдена подсветка (точное совпадение): "${searchText}"`, 'highlight');
                                callback({ id: h.id, highlight: h });
                                return;
                            }
                        }

                        // Частичное совпадение: выделенный текст содержится в подсветке или наоборот
                        for (const h of highlights) {
                            const highlightText = (h.text || '').trim().replace(/\s+/g, ' ');
                            if (highlightText && searchText &&
                                (highlightText.includes(searchText) || searchText.includes(highlightText))) {
                                log(`🔍 Найде����о частичное совпадение: "${searchText}" ↔ "${highlightText}"`, 'highlight');
                                callback({ id: h.id, highlight: h });
                                return;
                            }
                        }

                        callback(null);
                    } catch(e) {
                        log(`❌ Ошибка парсинга подсветок: ${e.message}`, 'error');
                        callback(null);
                    }
                });
            } catch (e) {
                log(`❌ Ошибка поиска подсветки: ${e.message}`, 'error');
                callback(null);
            }
        }

        /**
         * Удалить подсветку для текущего выделения
         */
        function deleteCurrentHighlight() {
            if (!bridge || !currentBookPath) {
                log('❌ Нет моста или книги для удаления подсветки', 'error');
                return false;
            }

            // Находим подсветку асинхронно
            findHighlightForCurrentSelection(function(existingHighlight) {
                if (!existingHighlight) {
                    log('⚠️ Подсветка для текущего выделения не найдена', 'warn');
                    return;
                }

                try {
                    const pythonId = existingHighlight.id;
                    log(`🗑️ Удаляем подсветку ID=${pythonId}`, 'highlight');

                    // Удаляем из Python
                    bridge.removeHighlight(pythonId);

                    // Удаляем из Overlayer (визуально)
                    const ov = getOverlayer();
                    if (ov) {
                        try {
                            // Пробуем удалить по ID из Python
                            ov.remove(pythonId);
                            log(`✅ Подсветка удал��на из Overlayer`, 'highlight');
                        } catch(e) {
                            log(`⚠️ Ошиб��а удаления из Overlayer: ${e.message}`, 'warn');
                        }
                    }

                    // Удаляем из локального хранилищ��
                    delete userHighlightMap[pythonId];

                    // Находим и удаляем закладку с этим текстом (WebChannel использует callback)
                    const highlightText = existingHighlight.highlight?.text || '';
                    bridge.getBookmarks(function(result) {
                        try {
                            const bookmarks = JSON.parse(result);
                            for (const bm of bookmarks) {
                                if (bm.label && bm.label.startsWith('🖊') && highlightText && bm.label.includes(highlightText)) {
                                    bridge.removeBookmark(bm.id);
                                    log(`🗑️ Закладка удалена: ${bm.id}`, 'highlight');
                                    break;
                                }
                            }
                        } catch(e) {
                            log(`❌ Ошибка получения закладок: ${e.message}`, 'error');
                        }
                    });

                    // Обновляем UI закладок
                    setTimeout(() => { loadBookmarks(); updateBookmarkButton(); }, 200);

                    // Обновляем иконку кнопки
                    updateHighlightButtonIcon();

                    log(`🗑️ Подсветка удалена: ${existingHighlight.highlight.text?.substring(0, 40)}`, 'highlight');

                } catch (e) {
                    log(`❌ Ошибка удаления подсветки: ${e.message}`, 'error');
                    console.error(e);
                }
            });

            return true;
        }

        function createUserHighlight(color = 'blue', style = 'highlight') {
            if (!currentRange || !currentRangeDoc) {
                log('❌ Нет выделения (currentRange или currentRangeDoc отсутствует)', 'error');
                return;
            }

            const savedRange = currentRange.cloneRange(); // Клонируем Range для безопасности
            const savedDoc   = currentRangeDoc;
            const savedText  = currentSelection;

            // Создаём ID заранее, чтобы использовать его и в Python, и в Overlayer
            const id = 'user-' + Date.now();

            // Сразу сбрасываем UI
            currentRange = null;
            currentRangeDoc = null;
            currentSelection = null;
            document.getElementById('selectionToolbar').classList.remove('visible');
            document.getElementById('miniPalette').classList.remove('visible');

            try {
                const ov = getOverlayer();
                if (!ov) {
                    log('❌ Overlayer недоступен', 'error');
                    return;
                }

                const hexColor = HIGHLIGHT_COLORS[color] || '#aecbfa';
                
                // Выбираем метод отрисовки в зависимости от стиля
                const styleMethod = {
                    'highlight': Overlayer.highlight,
                    'underline': Overlayer.underline,
                    'squiggly': Overlayer.squiggly,
                }[style] || Overlayer.highlight;

                log(`🎨 Применяем подсветку: цвет=${color}, стиль=${style}, текст=${savedText?.substring(0, 30)}, ID=${id}`, 'highlight');
                log(`🔍 Range: startOffset=${savedRange.startOffset}, endOffset=${savedRange.endOffset}`, 'highlight');

                // Применяем подсветку через Overlayer
                try {
                    ov.add(id, savedRange, styleMethod, { color: hexColor + 'b8' });
                    log(`✅ Подсветка добавлена в Overlayer (стиль: ${style})`, 'highlight');
                } catch(ovError) {
                    log(`❌ Ошибка ov.add: ${ovError.message}`, 'error');
                    console.error(ovError);
                    return;
                }

                // Убираем синее выделение текста в iframe
                try { savedDoc.getSelection()?.removeAllRanges(); } catch(e) {}

                // Получаем CFI этой строки для навигации через закладку
                let cfi = null;
                try { cfi = view.getCFI(currentSection, savedRange); } catch(e) {}

                // Сохраняем подсветку в Python с тем же ID
                if (bridge) {
                    bridge.saveHighlight(savedText, color, style, JSON.stringify({
                        id: id,
                        section: currentSection,
                        text: savedText,
                        cfi: cfi
                    }));

                    // Сохраняем соответствие ID
                    userHighlightMap[id] = id;
                }

                log(`✨ Подсветка [${style}/${color}]: ${savedText?.substring(0,40)}`, 'highlight');

            } catch(e) {
                log(`❌ Ошибка подсветки: ${e.message}`, 'error');
                console.error(e);
            }
        }

        // ==================== ОБРАБОТКА ВЫДЕЛЕНИЯ ====================
        function initSelectionHandlers() {
            // Выделение текста перехватывается через view 'load' event (iframe pointerup)
            // Здесь только обработка кликов вне книги — закрываем тулбар
            document.addEventListener('pointerdown', (e) => {
                const toolbar = document.getElementById('selectionToolbar');
                const palette = document.getElementById('miniPalette');

                // Закрываем только если клик вне тулбара И вне палитры
                if (toolbar && !toolbar.contains(e.target) && palette && !palette.contains(e.target)) {
                    toolbar.classList.remove('visible');
                    palette.classList.remove('visible');
                    // Сбрасываем transform в default
                    setTimeout(() => {
                        palette.style.transform = 'translate(-50%, 0)';
                    }, 200);
                }
            });

            document.getElementById('copyBtn')?.addEventListener('click', () => {
                if (!currentSelection) {
                    log('⚠️ Нет текста для копирования', 'warn');
                    return;
                }
                
                log(`📋 Копируем текст: ${currentSelection.substring(0, 50)}...`, 'info');
                
                // Пробуем копировать через Qt (надёжнее в PyQt6 WebEngine)
                if (bridge && bridge.copyToClipboard) {
                    bridge.copyToClipboard(currentSelection);
                    log('✅ Текст скопирован чер������������з Qt', 'info');
                    setTimeout(() => {
                        document.getElementById('selectionToolbar').classList.remove('visible');
                        document.getElementById('miniPalette')?.classList.remove('visible');
                    }, 100);
                } else {
                    // Fallback через execCommand
                    try {
                        const textArea = document.createElement('textarea');
                        textArea.value = currentSelection;
                        textArea.style.position = 'fixed';
                        textArea.style.left = '-9999px';
                        textArea.style.top = '0';
                        textArea.style.opacity = '0';
                        document.body.appendChild(textArea);
                        
                        textArea.focus();
                        textArea.select();
                        
                        const successful = document.execCommand('copy');
                        document.body.removeChild(textArea);
                        
                        if (successful) {
                            log('✅ Текст скопирован через execCommand', 'info');
                            setTimeout(() => {

        // ==================== TTS НАСТРОЙКИ ====================
        function loadTTSSettings() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const settings = JSON.parse(saved);
                    currentEngine = settings.engine || 'Piper';

                    // МИГРАЦИЯ: если в localStorage лежит Edge — принудительно переключаем
                    // на Piper (Edge требует интернет, плохо работает при обрывах связи)
                    if (currentEngine === 'Edge') {
                        log('🔄 Миграция: Edge → Piper (без интернета не работает)', 'tts');
                        currentEngine = 'Piper';
                        currentVoice = 'ru_RU_irina_medium';
                        // Сохраняем миграцию обратно чтобы не повторялась
                        settings.engine = 'Piper';
                        settings.voice = 'ru_RU_irina_medium';
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
                    } else {
                        let defaultVoice = 'ru_RU_irina_medium';
                        if (currentEngine === 'RHVoice' || currentEngine === 'SpeechD') {
                            defaultVoice = 'Anna';
                        }
                        currentVoice = settings.voice || defaultVoice;
                    }

                    ttsSpeed = settings.speed || 1.0;
                    document.getElementById('engineSelect').value = currentEngine;
                    document.getElementById('speedSlider').value = ttsSpeed;
                    document.getElementById('speedValue').textContent = ttsSpeed + 'x';
                    log(`📦 Загружены настройки TTS: ${currentEngine} / ${currentVoice}`, 'tts');
                }
            } catch(e) {}
            renderVoiceList();
        }

                localStorage.setItem('tts_settings', JSON.stringify({

                    voice: currentVoice,

                }));
