        }

        function renderVoiceList() {
            const container = document.getElementById('voiceList');
            if (!container) return;

            const voices = VOICES[currentEngine] || [];
            container.innerHTML = '';

            if (!voices.length) {
                container.innerHTML = '<div style="color:#9aa0a6;font-size:12px;padding:8px 12px;">Голоса не найдены</div>';
                return;
            }

            voices.forEach(voice => {
                const div = document.createElement('div');
                const isSelected = currentVoice === voice.id;
                div.className = 'voice-item' + (isSelected ? ' selected' : '');

                // Правая кнопка: только Piper — скачать/прогресс/галочка.
                const isPiper = (currentEngine === 'Piper');
                let btnHtml = '';
                if (isPiper) {
                    if (voice.downloading) {
                        btnHtml = `<button class="vi-btn vi-dl" style="cursor:default;" title="${voice.progress}%">
                            <span class="material-icons" style="font-size:16px;animation:spin 1s linear infinite;">sync</span>
                        </button>
                        <div class="vi-progress" style="width:${voice.progress || 0}%"></div>`;
                    } else if (voice.available) {
                        btnHtml = `<button class="vi-btn vi-ok" title="Установлен">
                            <span class="material-icons" style="font-size:16px;">check</span>
                        </button>`;
                    } else {
                        btnHtml = `<button class="vi-btn vi-dl" data-dl="${voice.id}" title="Скачать (${voice.size || ''})">
                            <span class="material-icons" style="font-size:16px;">download</span>
                        </button>`;
                    }
                } else {
                    // Для системных движков показываем галочку, если голос доступен
                    if (voice.available !== false) { // если available не равно false, значит голос доступен
                        btnHtml = `<button class="vi-btn vi-ok" title="Доступен" style="cursor:default;">
                            <span class="material-icons" style="font-size:16px;">check</span>
                        </button>`;
                    } else {
                        btnHtml = `<button class="vi-btn vi-dl" style="cursor:default; background:rgba(255,255,255,0.05);" title="Недоступен">
                            <span class="material-icons" style="font-size:14px; color:#777;">block</span>
                        </button>`;
                    }
                }

                // ── Устанавливаем содержимое карточки голоса ──────────────
                div.innerHTML =
                    `<span class="vi-sel material-icons" style="font-size:16px;color:#1a73e8;margin-right:6px;opacity:${isSelected?1:0};transition:opacity .15s;">check</span>` +
                    `<span class="vi-name" style="flex:1;font-size:13px;color:#e8eaed;">${voice.name || voice.id}</span>` +
                    btnHtml;

                // Клик по кнопке скачать (после установки innerHTML)
                const dlBtn = div.querySelector('[data-dl]');
                if (dlBtn) {
                    dlBtn.addEventListener('click', e => {
                        e.stopPropagation();
                        downloadVoice(voice.id);
                    });
                }

                // Клик по строке → выбрать голос
                div.addEventListener('click', () => {
                    if (isPiper && !voice.available) return; // Для Piper не выбираем неустановленные голоса
                    currentVoice = voice.id;
                    renderVoiceList();
                    if (bridge) bridge.setVoice(voice.id);
                    saveTTSSettings();
                    log('🗣️ Голос: ' + voice.name, 'tts');
                });

                container.appendChild(div);
            });
        }

        function downloadVoice(voiceId) {
            const voice = VOICES['Piper'].find(v => v.id === voiceId);
            if (!voice || voice.downloading) return;

            voice.downloading = true;
            voice.progress = 0;
            renderVoiceList();
            log(`📥 Скачивание ${voice.name} (${voice.size})...`, 'tts');

            if (bridge?.downloadVoice) {
                bridge.downloadVoice(voiceId);
            } else {
                log('❌ bridge.downloadVoice недоступен', 'error');
                voice.downloading = false;
                renderVoiceList();
            }
        }

        // ==================== ГОЛОСА PIPER ====================

         // ==================== СИСТЕМНЫЕ TTS ДВИЖКИ ====================
        // Обнаруживает SAPI5 (Windows) / speech-dispatcher (Linux).
        // К��ждый установленный модуль (RHVoice, espeak-ng...) = отдельный движок в select.
        function detectSystemEngines(retryCount) {
            if (!bridge) return;
            // Qt6 WebChannel: не используем typeof — вызываем напрямую с try/catch
            try {
                bridge.getSystemEngines(json => {
                    try {
                        const engines = JSON.parse(json);
                        let added = 0;
                        engines.forEach(eng => {
                            if (!eng.voices?.length) return;
                            VOICES[eng.key] = eng.voices.map(v => ({
                                id: v.id, name: v.name,
                                available: true, downloading: false,
                                progress: 0, size: ''
                            }));
                            _addEngineOption(eng.key, eng.label);
                            log('🎙️ ' + eng.label + ': ' + eng.voices.length + ' голосов', 'tts');
                            added++;
                        });
                        if (added) {
                            renderVoiceList();
                            // Выбираем голос по умолчанию для обнаруженного движка
                            engines.forEach(eng => {
                                const voices = VOICES[eng.key];
                                if (!voices || voices.length === 0) return;
                                
                                // Проверяем, является ли этот движок текущим выбранным
                                if (eng.key !== currentEngine) return;
                                
                                // Проверяем, выбран ли уже голос
                                const hasCurrentVoice = voices.some(v => v.id === currentVoice && v.available !== false);
                                if (!hasCurrentVoice) {
                                    // Выбираем голос по умолчанию в зависимости от движка
                                    let defaultId = null;
                                    if (eng.key === 'Piper') {
                                        defaultId = 'ru_RU_irina_medium';
                                    } else if (eng.key === 'RHVoice' || eng.key === 'SpeechD') {
                                        defaultId = 'Anna';
                                    } else if (eng.key === 'Edge') {
                                        defaultId = 'ru-RU-SvetlanaNeural';
                                    }
                                    
                                    // Пробуем найти голос по умолчанию, иначе первый доступный
                                    let defaultVoice = defaultId ? voices.find(v => v.id === defaultId) : null;
                                    if (!defaultVoice) defaultVoice = voices[0];
                                    
                                    if (defaultVoice) {
                                        currentVoice = defaultVoice.id;
                                        saveTTSSettings();
                                        log('✅ Выбран голос по умолчанию: ' + currentVoice + ' (' + eng.key + ')', 'tts');
                                        renderVoiceList(); // Перерисовываем, чтобы показать галочку
                                    }
                                }
                            });
                        } else if (!retryCount || retryCount < 5) {
                            // TTSController м��г ещё не инициализировать движки — повт����ряем
                            const delay = [500, 1000, 2000, 3000, 5000][retryCount || 0];
                            setTimeout(() => detectSystemEngines((retryCount || 0) + 1), delay);
                        }
                    } catch(e) { log('getSystemEngines parse: ' + e.message, 'error'); }
                });
            } catch(e) {
                // Слот ещё не готов — п��втор
                if (!retryCount || retryCount < 5) {
                    const delay = [500, 1000, 2000, 3000, 5000][retryCount || 0];
                    setTimeout(() => detectSystemEngines((retryCount || 0) + 1), delay);
                }
            }
        }


        function _addEngineOption(value, label) {
            const sel = document.getElementById('engineSelect');
            if (!sel || [...sel.options].some(o => o.value === value)) return;
            const opt = document.createElement('option');
            opt.value = value; opt.textContent = label;
            sel.appendChild(opt);
            syncCustomEngineSelect();
        }

               // Проверяем, какие голоса уже установлены, и обновляем .available в VOICES['Piper']
        function checkPiperVoices() {
            if (!bridge) return;
            // Qt6 WebChannel: без typeof-проверки, сразу try/catch
            try {
            bridge.getPiperVoices(json => {
                try {
                    const voices = JSON.parse(json);
                    // Перестраиваем VOICES['Piper'] полностью из ответа сервера.
                    // installed:true — голос уже есть в директории, сразу доступен.
                    // installed:false — нужно скачать (показываем кнопку скачать).
                    VOICES['Piper'] = voices.map(v => ({
                        id:          v.id,
                        name:        v.name,
                        available:   v.installed === true,
                        downloading: false,
                        progress:    0,
                        size:        v.size_mb ? `~${v.size_mb} МБ` : '',
                    }));
                    const nInst = VOICES['Piper'].filter(v => v.available).length;
                    if (currentEngine === 'Piper') {
                        // Проверяем, выбран ли уже доступный голос
                        const hasCurrentVoice = VOICES['Piper'].some(
                            v => v.id === currentVoice && v.available);
                        if (!hasCurrentVoice) {
                            // Пробуем выбрать Ирину по умолчанию
                            let irina = VOICES['Piper'].find(v => v.id === 'ru_RU_irina_medium' && v.available);
                            if (!irina) irina = VOICES['Piper'].find(v => v.available);
                            if (irina) {
                                currentVoice = irina.id;
                                saveTTSSettings();
                                log('✅ Выбран голос Piper по умолчанию: ' + currentVoice, 'tts');
                            }
                        }
                    }
                    log('📢 Piper: ' + nInst + ' установлено, ' +
                        (VOICES['Piper'].length - nInst) + ' доступно для загрузки', 'tts');
                    renderVoiceList();
                } catch(e) {
                    log('❌ checkPiperVoices parse: ' + e.message, 'error');
                }
            });
            } catch(e) {
                // Слот ещё не готов — повтор через 500мс
                setTimeout(checkPiperVoices, 500);
            }
        }

        // Колбэки от Python при скачивании
        window.onPiperVoiceProgress = function(voiceId, percent) {
            const voice = VOICES['Piper'].find(v => v.id === voiceId);
            if (voice) { voice.progress = percent; renderVoiceList(); }

        window.onPiperVoiceFinished = function(voiceId, success) {
            const voice = VOICES['Piper'].find(v => v.id === voiceId);
            if (voice) {
                voice.downloading = false;
                voice.available = success;
                voice.progress = 0;
                renderVoiceList();
                if (success) {
                    log(`✅ Голос ${voice.name} установлен`, 'tts');
                    // Автовыбираем только что установленный голос
                    if (currentEngine === 'Piper' && !currentVoice) {
                        currentVoice = voice.id;

                        saveTTSSettings();

                } else {
                    log(`❌ Ошибка загрузки ${voice.name}`, 'error');
                }
            }
        };
        window.onPiperVoiceError = function(voiceId, err) {
            const voice = VOICES['Piper'].find(v => v.id === voiceId);
            if (voice) { voice.downloading = false; voice.progress = 0; renderVoiceList(); }
            log(`❌ Piper ошибка (${voiceId}): ${err}`, 'error');
        };

        // ── Push-handlers: Python вставляет данные напрямую через runJavaScript ──

        // Вызывается из Python._push_tts_data() ��� список Piper голосов
        window._pushPiperVoices = function(voices) {
            // Обновляем только статус available для существующих голосов
            voices.forEach(v => {
                const existing = VOICES['Piper'].find(p => p.id === v.id);
                if (existing) {
                    existing.available = v.installed === true;
                }
            });
            const nInst = VOICES['Piper'].filter(v => v.available).length;
            log('📢 Piper (push): ' + nInst + '/' + VOICES['Piper'].length + ' установлено', 'tts');
            // Автовыбор установленного голоса
            if (currentEngine === 'Piper') {
                const ok = VOICES['Piper'].some(v => v.id === currentVoice && v.available);
                if (!ok) {
                    const first = VOICES['Piper'].find(v => v.available);
                    if (first) { currentVoice = first.id; saveTTSSettings(); }
                }
            }
            renderVoiceList();
        };

        // Вызывается из Python._push_tts_data() — системные движки (RHVoice и др.)
        window._pushSystemEngines = function(engines) {
            engines.forEach(eng => {
                if (!eng.voices || !eng.voices.length) return;
                // Не добавляем, если уже есть (защита от дублирования с detectSystemEngines)
                if (VOICES[eng.key]) {
                    log('🎙️ ' + eng.label + ' (push): уже есть, пропускаем', 'tts');
                    return;
                }
                VOICES[eng.key] = eng.voices.map(v => ({
                    id: v.id, name: v.name,
                    available: true, downloading: false,
                    progress: 0, size: '',
                }));
                _addEngineOption(eng.key, eng.label);
                log('🎙️ ' + eng.label + ' (push): ' + eng.voices.length + ' голосов', 'tts');
            });

        function syncCustomEngineSelect() {
            const hiddenSelect = document.getElementById('engineSelect');

            const label = document.getElementById('engineSelectLabel');
            if (!hiddenSelect || !dropdown) return;

            dropdown.innerHTML = '';
            for (const opt of hiddenSelect.options) {
                const div = document.createElement('div');
                div.className = 'custom-select-option' + (opt.value === hiddenSelect.value ? ' selected' : '');
                div.dataset.value = opt.value;
                div.textContent = opt.text;
                dropdown.appendChild(div);
            }
            // Обновляем label
            const selected = hiddenSelect.options[hiddenSelect.selectedIndex];
            if (selected && label) label.textContent = selected.text;
        }


        function initCustomEngineSelect() {
            const trigger = document.getElementById('engineSelectTrigger');
            const dropdown = document.getElementById('engineSelectDropdown');
            const hiddenSelect = document.getElementById('engineSelect');
            if (!trigger || !dropdown) return;

            // Открыть/закрыть
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = dropdown.classList.contains('open');
                dropdown.classList.toggle('open', !isOpen);
                trigger.classList.toggle('open', !isOpen);
            });

            // Закрыть при клике вне
            document.addEventListener('click', () => {
                dropdown.classList.remove('open');
                trigger.classList.remove('open');
            });

            // Выбор пункта
            dropdown.addEventListener('click', (e) => {
                const opt = e.target.closest('.custom-select-option');
                if (!opt) return;
                const value = opt.dataset.value;
                const label = opt.textContent;

                // Обновляем визуал
                dropdown.querySelectorAll('.custom-select-option').forEach(o =>
                    o.classList.toggle('selected', o === opt));
                document.getElementById('engineSelectLabel').textContent = label;

                // Синхронизируем скрытый select
                hiddenSelect.value = value;

                // Закрываем
                dropdown.classList.remove('open');
                trigger.classList.remove('open');

                // Генерируем событие change на скрытом select
                hiddenSelect.dispatchEvent(new Event('change'));
            });
        }

            // Просмотр комиксов
            const comicModal = document.getElementById('comicViewerModal');

            let comicScale = 1;

            // Закрытие
            document.getElementById('comicClose')?.addEventListener('click', () => {
                comicModal.classList.remove('visible');

            });

                if (e.target === comicContent) {
                    comicModal.classList.remove('visible');

                }
            });
            
            // Зум
            const updateComicZoom = () => {
                if (!comicImg) return;
                comicImg.style.transform = `scale(${comicScale})`;
                log(`🔍 Зум комикса: ${comicScale}x`, 'info');
                if (comicContent) {
                    comicContent.classList.toggle('zoomed', comicScale > 1);
                }
            };

            document.getElementById('comicZoomIn')?.addEventListener('click', () => {
                comicScale = Math.min(comicScale + 0.25, 5);
                updateComicZoom();
            });

            document.getElementById('comicZoomOut')?.addEventListener('click', () => {
                comicScale = Math.max(comicScale - 0.25, 0.5);
                updateComicZoom();
            });

            document.getElementById('comicZoomReset')?.addEventListener('click', () => {
                comicScale = 1;
                updateComicZoom();
            });
            
            // Горячие клавиши
            document.addEventListener('keydown', (e) => {
                if (!comicModal?.classList.contains('visible')) return;
                
                if (e.ctrlKey && e.key === '+') {
                    e.preventDefault();
                    comicScale = Math.min(comicScale + 0.25, 5);
                    updateComicZoom();
                } else if (e.ctrlKey && (e.key === '-' || e.key === '_')) {
                    e.preventDefault();
                    comicScale = Math.max(comicScale - 0.25, 0.5);
                    updateComicZoom();
                } else if (e.ctrlKey && e.key === '0') {
                    e.preventDefault();
                    comicScale = 1;
                    updateComicZoom();
                } else if (e.key === 'Escape') {
                    comicModal.classList.remove('visible');
                    comicImg.src = '';
                }
            });
            
            // Перетаскивание при увеличении
            let isDragging = false;
            let startX, startY, scrollLeft, scrollTop;
            
            comicContent.addEventListener('mousedown', (e) => {
                if (comicScale <= 1) return;
                isDragging = true;
                startX = e.pageX - comicContent.offsetLeft;
                startY = e.pageY - comicContent.offsetTop;
                scrollLeft = comicContent.scrollLeft;
                scrollTop = comicContent.scrollTop;
                comicContent.classList.add('zoomed');
            });
            
            comicContent.addEventListener('mouseleave', () => {
                isDragging = false;
                comicContent.classList.remove('zoomed');
            });
            
            comicContent.addEventListener('mouseup', () => {
                isDragging = false;
                comicContent.classList.remove('zoomed');
            });
            
            comicContent.addEventListener('mousemove', (e) => {
                if (!isDragging || comicScale <= 1) return;
                e.preventDefault();
                const x = e.pageX - comicContent.offsetLeft;
                const y = e.pageY - comicContent.offsetTop;
                const walkX = (x - startX) * 2;
                const walkY = (y - startY) * 2;
                comicContent.scrollLeft = scrollLeft - walkX;
                comicContent.scrollTop = scrollTop - walkY;
            });

            // === ОБЩИЕ ГОРЯЧИЕ КЛАВИШИ ===
            document.addEventListener('keydown', (e) => {
                // Игнорируем если фокус в input/textarea
                if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;

                // Навигация: Стрелки, Page Up/Down
                if (e.key === 'ArrowRight' || e.key === 'PageDown') {
                    e.preventDefault();
                    if (view?.renderer?.next) view.renderer.next();
                } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                    e.preventDefault();
                    if (view?.renderer?.prev) view.renderer.prev();
                }
                // Масштаб: Ctrl + / -
                else if (e.ctrlKey && (e.key === '=' || e.key === '+')) {
                    e.preventDefault();
                    const currentZoom = view?.renderer?.getAttribute('zoom') || '1';
                    const newZoom = Math.min(parseFloat(currentZoom) + 0.1, 3);
                    if (view?.renderer) view.renderer.setAttribute('zoom', newZoom.toString());
                    log(`🔍 Масштаб: ${(newZoom * 100).toFixed(0)}%`, 'info');
                } else if (e.ctrlKey && (e.key === '-' || e.key === '_')) {
                    e.preventDefault();
                    const currentZoom = view?.renderer?.getAttribute('zoom') || '1';
                    const newZoom = Math.max(parseFloat(currentZoom) - 0.1, 0.5);
                    if (view?.renderer) view.renderer.setAttribute('zoom', newZoom.toString());
                    log(`🔍 Масштаб: ${(newZoom * 100).toFixed(0)}%`, 'info');
                } else if (e.ctrlKey && e.key === '0') {
                    e.preventDefault();
                    if (view?.renderer) view.renderer.setAttribute('zoom', '1');
                    log('🔍 Масштаб: 100%', 'info');
                }
                // Поиск: Ctrl + F
                else if (e.ctrlKey && e.key === 'f') {
                    e.preventDefault();
                    const tocPanel = document.getElementById('tocPanel');
                    const searchInput = document.getElementById('bookSearchInput');
                    if (tocPanel && searchInput) {
                        tocPanel.classList.add('visible');
                        document.getElementById('overlay')?.classList.add('visible');
                        switchTocTab('search');
                        searchInput.focus();
                        searchInput.select();
                    }
                }
                // Оглавление: Ctrl + T
                else if (e.ctrlKey && e.key === 't') {
                    e.preventDefault();
                    toggleToc();
                }
                // Закладки: Ctrl + D
                else if (e.ctrlKey && e.key === 'd') {
                    e.preventDefault();
                    const tocPanel = document.getElementById('tocPanel');
                    const bookmarksPanel = document.getElementById('bookmarksPanel');
                    const overlay = document.getElementById('overlay');
                    
                    // Если открыто оглавление — закрываем его перед открытием закладок
                    if (tocPanel?.classList.contains('visible')) {
                        tocPanel.classList.remove('visible');
                    }
                    
                    // Переключаем закладки
                    const willOpen = !bookmarksPanel?.classList.contains('visible');
                    bookmarksPanel?.classList.toggle('visible');
                    overlay?.classList.toggle('visible');
                    
                    // Если закрываем — снимаем блюр
                    if (!willOpen) {
                        overlay?.classList.remove('visible');
                    }
                }
                // TTS Пауза/Старт: Space (Пробел)
                else if (e.key === ' ' && !e.ctrlKey && !e.altKey && !e.metaKey) {
                    // Игнорируем если фокус в input/textarea
                    if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
                    e.preventDefault();
                    if (ttsActive) {
                        if (ttsPaused) resumeTTS();
                        else pauseTTS();
                    } else {
                        startTTS();
                    }
                }
                // TTS Стоп: Ctrl + .
                else if (e.ctrlKey && e.key === '.') {
                    e.preventDefault();
                    stopTTSFull();
                }
                // Полноэкранный режим: F11
                else if (e.key === 'F11') {
                    e.preventDefault();
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                }
                // Справка: F1
                else if (e.key === 'F1') {
                    e.preventDefault();
                    showKeyboardShortcutsHelp();
                }
            });

                if (relY > (1 - DEAD_ZONE_BOTTOM)) {

            if (!header || !coverImg || !infoTitle || !infoAuthor) return;
            
            // Показываем панель
            header.style.display = 'flex';
            
            // Устанавливаем название и автора (с обрезкой)
            const shortTitle = title.length > 35 ? title.substring(0, 35) + '…' : title;
            infoTitle.textContent = shortTitle;
            infoAuthor.textContent = author || '';
            infoTitle.title = title;  // Полное название в tooltip
            infoAuthor.title = author || '';
            
            // Для CBZ показываем первую страницу как обложку
            if (bookType === 'cbz' && book?.sections?.length > 0) {
                const firstSection = book.sections[0];
                if (firstSection) {
                    firstSection.load().then(pageUrl => {
                        const match = pageUrl.match(/<img src="([^"]+)"/);
                        if (match && match[1]) {
                            coverImg.src = match[1];
                            coverImg.style.display = 'block';
                        } else {
                            coverImg.style.display = 'none';
                        }
                    }).catch(() => {
                        coverImg.style.display = 'none';
                    });
                }
            } else {
                // Для EPUB/FB2 пытаемся получить обложку
                if (book?.getCover) {
                    book.getCover().then(blob => {
                        if (blob) {
                            // Освобождаем предыдущий blob URL если был
                            if (coverImg.src && coverImg.src.startsWith('blob:')) {
                                URL.revokeObjectURL(coverImg.src);
                            }
                            coverImg.src = URL.createObjectURL(blob);
                            coverImg.style.display = 'block';
                        } else {
                            coverImg.style.display = 'none';
                        }
                    }).catch(() => {
                        coverImg.style.display = 'none';
                    });
                } else {
                    coverImg.style.display = 'none';
                }
            }
        }

        init();
    </script>
<!-- Модальное окно для просмотра комиксов -->
<div class="comic-viewer-modal" id="comicViewerModal">
    <div class="comic-viewer-toolbar">
        <button class="icon-button" id="comicZoomOut" title="Уменьшить (Ctrl+-)"><span class="material-icons">remove</span></button>
        <button class="icon-button" id="comicZoomIn" title="Увеличить (Ctrl++)"><span class="material-icons">add</span></button>
        <button class="icon-button" id="comicZoomReset" title="Сбросить (Ctrl+0)"><span class="material-icons">refresh</span></button>
        <div style="width:1px;height:24px;background:rgba(255,255,255,0.2);margin:0 4px;"></div>
        <button class="icon-button" id="comicClose" title="Закрыть (Esc)"><span class="material-icons">close</span></button>
    </div>
    <div class="comic-viewer-content" id="comicViewerContent">
        <img id="comicViewerImg" src="" alt="Comic page">
    </div>
</div>
<!-- Модальное окно для сносок -->
<div class="footnote-modal" id="footnoteModal">
    <div class="footnote-header">
        <h4>📖 Сноска</h4>
        <button class="footnote-close" onclick="document.getElementById('footnoteModal').classList.remove('visible')">
            <span class="material-icons">close</span>
        </button>
    </div>
    <div class="footnote-content" id="footnoteContent"></div>
</div>
